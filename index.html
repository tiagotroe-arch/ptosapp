/* ── STORAGE ── */
const KEY   = 'os_app_v5';
const EMPTY = {clientes:[],ordens:[],orcamentos:[],produtos:[],servicos:[]};
const loadLocal = () => { try{const s=localStorage.getItem(KEY); return s?{...EMPTY,...JSON.parse(s)}:null;}catch{return null;} };
const saveLocal = (d) => { try{localStorage.setItem(KEY,JSON.stringify(d));}catch{} };
const BIN_KEY = 'os_bin_v5';
const getBinId = () => { try{return localStorage.getItem(BIN_KEY)||'';}catch{return '';} };
const setBinId = (id) => { try{localStorage.setItem(BIN_KEY,id);}catch{} };
const getJbKey = () => { try{return window._jbkey||localStorage.getItem('os_jbk')||'';}catch{return '';} };

window._syncStatus = { ok:null, msg:'' };

const loadCloud = async (bid) => {
  const k=getJbKey();
  if(!k) { window._syncStatus={ok:false,msg:'Sem Master Key configurada'}; return null; }
  if(!bid) { window._syncStatus={ok:false,msg:'Nenhum bin criado ainda. Salve algo primeiro para criar um.'}; return null; }
  try{
    const r=await fetch('https://api.jsonbin.io/v3/b/'+bid+'/latest',{headers:{'X-Master-Key':k}});
    if(!r.ok){
      const errBody = await r.text().catch(()=>'');
      window._syncStatus={ok:false,msg:'Erro '+r.status+' ao buscar: '+errBody.slice(0,150)};
      return null;
    }
    const d=await r.json();
    window._syncStatus={ok:true,msg:'Dados carregados da nuvem!'};
    return d.record?{...EMPTY,...d.record}:null;
  }catch(e){ window._syncStatus={ok:false,msg:'Erro de rede: '+e.message}; return null; }
};

const saveCloud = async (data) => {
  const k=getJbKey();
  if(!k){ window._syncStatus={ok:false,msg:'Sem Master Key configurada'}; return; }
  const bid=getBinId();
  try{
    if(!bid){
      const r=await fetch('https://api.jsonbin.io/v3/b',{method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':k,'X-Bin-Private':'false','X-Bin-Name':'PointTech'},body:JSON.stringify(data)});
      if(!r.ok){
        const errBody = await r.text().catch(()=>'');
        window._syncStatus={ok:false,msg:'Erro '+r.status+' ao criar bin: '+errBody.slice(0,150)};
        return;
      }
      const d=await r.json();
      if(d.metadata && d.metadata.id){
        setBinId(d.metadata.id);
        window._syncStatus={ok:true,msg:'Bin criado e dados salvos!'};
      } else {
        window._syncStatus={ok:false,msg:'Resposta sem ID de bin: '+JSON.stringify(d).slice(0,150)};
      }
    } else {
      const r=await fetch('https://api.jsonbin.io/v3/b/'+bid,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':k},body:JSON.stringify(data)});
      if(!r.ok){
        const errBody = await r.text().catch(()=>'');
        window._syncStatus={ok:false,msg:'Erro '+r.status+' ao salvar: '+errBody.slice(0,150)};
        return;
      }
      window._syncStatus={ok:true,msg:'Dados salvos na nuvem!'};
    }
  }catch(e){ window._syncStatus={ok:false,msg:'Erro de rede: '+e.message}; }
};

const loadData = () => loadLocal()||EMPTY;
const saveData = (d) => { saveLocal(d); if(getJbKey()) saveCloud(d); };

const buscarCnpj = async (cnpj, onFound, setMsg) => {
  const digits = cnpj.replace(/\D/g,'');
  if(digits.length!==14){ setMsg({t:'CNPJ deve ter 14 digitos',ok:false}); return; }
  setMsg({t:'Buscando dados do CNPJ...',ok:null});
  try{
    const r = await fetch('https://brasilapi.com.br/api/cnpj/v1/'+digits);
    if(!r.ok){ setMsg({t:'CNPJ nao encontrado',ok:false}); return; }
    const d = await r.json();
    onFound({
      nome: d.razao_social || d.nome_fantasia || '',
      telefone: d.ddd_telefone_1 ? d.ddd_telefone_1 : '',
      email: d.email || '',
      cep: d.cep || '',
      logradouro: (d.descricao_tipo_de_logradouro?d.descricao_tipo_de_logradouro+' ':'')+(d.logradouro||''),
      numero: d.numero || '',
      complemento: d.complemento || '',
      bairro: d.bairro || '',
      cidade: d.municipio || '',
      estado: d.uf || '',
    });
    setMsg({t:'Dados da empresa preenchidos!',ok:true});
  }catch(e){ setMsg({t:'Erro ao buscar CNPJ. Preencha manualmente.',ok:false}); }
};

const buscarCep = (cep, onFound, setMsg) => {
  const digits = cep.replace(/\D/g,'');
  if(digits.length!==8){setMsg({t:'CEP deve ter 8 digitos',ok:false});return;}
  setMsg({t:'Buscando...',ok:null});
  const cbName = '_vc_'+Date.now();
  const tid = setTimeout(()=>{
    try{delete window[cbName];}catch{}
    const s=document.getElementById(cbName); if(s)s.remove();
    // fallback local
    const p5=digits.slice(0,5),p4=digits.slice(0,4),p3=digits.slice(0,3);
    const m=PR_CEPS[p5]||PR_CEPS[p4]||PR_CEPS[p3];
    if(m){onFound({logradouro:'',bairro:m[0],localidade:m[1],uf:'PR'});setMsg({t:'Cidade e bairro preenchidos!',ok:true});}
    else setMsg({t:'CEP nao encontrado. Preencha manualmente.',ok:false});
  },5000);
  window[cbName]=(d)=>{
    clearTimeout(tid); try{delete window[cbName];}catch{}
    const s=document.getElementById(cbName); if(s)s.remove();
    if(d&&!d.erro){onFound({logradouro:d.logradouro||'',bairro:d.bairro||'',localidade:d.localidade||'',uf:d.uf||'PR'});setMsg({t:d.logradouro?'Endereço completo!':'Cidade e bairro preenchidos!',ok:true});}
    else{
      const p5=digits.slice(0,5),p4=digits.slice(0,4),p3=digits.slice(0,3);
      const m=PR_CEPS[p5]||PR_CEPS[p4]||PR_CEPS[p3];
      if(m){onFound({logradouro:'',bairro:m[0],localidade:m[1],uf:'PR'});setMsg({t:'Cidade e bairro preenchidos!',ok:true});}
      else setMsg({t:'CEP nao encontrado.',ok:false});
    }
  };
  const sc=document.createElement('script'); sc.id=cbName;
  sc.src='https://viacep.com.br/ws/'+digits+'/json/?callback='+cbName;
  sc.onerror=()=>{clearTimeout(tid);try{delete window[cbName];}catch{};sc.remove();setMsg({t:'Servico indisponivel.',ok:false});};
  document.head.appendChild(sc);
};

const PressCard = ({children,style:cs={},onTap,onLong}) => {
  const timer=useRef(null),fired=useRef(false),startY=useRef(0);
  const onTS=(e)=>{fired.current=false;startY.current=e.touches[0].clientY;timer.current=setTimeout(()=>{fired.current=true;onLong&&onLong();},600);};
  const onTE=(e)=>{clearTimeout(timer.current);const dy=Math.abs(e.changedTouches[0].clientY-startY.current);if(!fired.current&&dy<8)onTap&&onTap();};
  const onTM=(e)=>{if(Math.abs(e.touches[0].clientY-startY.current)>8)clearTimeout(timer.current);};
  return h('div',{onTouchStart:onTS,onTouchEnd:onTE,onTouchMove:onTM,onClick:onTap,
    style:{background:C.card,borderRadius:14,padding:'14px 16px',border:'1px solid '+C.border,marginBottom:10,cursor:'pointer',userSelect:'none',WebkitUserSelect:'none',...cs}},children);
};

const SyncModal = ({onClose,setData,data}) => {
  const [key,setKey] = useState(getJbKey());
  const [status,setStatus] = useState(null); // {ok, msg}
  const [loading,setLoading] = useState(false);
  const binId = getBinId();

  const salvar = () => {
    if(!key.trim()){setStatus({ok:false,msg:'Cole a Master Key do JSONBin'});return;}
    window._jbkey=key.trim();
    try{localStorage.setItem('os_jbk',key.trim());}catch{}
    setStatus({ok:true,msg:'Chave salva! Agora toque em "Testar e enviar agora" para confirmar que funciona.'});
  };

  const testarEnviar = async () => {
    if(!key.trim()){setStatus({ok:false,msg:'Cole a Master Key primeiro'});return;}
    window._jbkey=key.trim();
    try{localStorage.setItem('os_jbk',key.trim());}catch{}
    setLoading(true); setStatus({ok:null,msg:'Enviando dados de teste...'});
    await saveCloud(data||EMPTY);
    setLoading(false);
    setStatus(window._syncStatus||{ok:false,msg:'Sem resposta'});
  };

  const sincronizar = async () => {
    if(!key.trim()){setStatus({ok:false,msg:'Configure a chave primeiro'});return;}
    window._jbkey=key.trim();
    setLoading(true); setStatus({ok:null,msg:'Buscando dados da nuvem...'});
    const d=await loadCloud(getBinId());
    setLoading(false);
    if(d){ setData(d); saveLocal(d); setStatus({ok:true,msg:'Dados sincronizados com sucesso!'}); }
    else setStatus(window._syncStatus||{ok:false,msg:'Nenhum dado encontrado'});
  };

  return h('div',{style:{position:'fixed',inset:0,background:'#000c',zIndex:9999,display:'flex',alignItems:'flex-end',justifyContent:'center'}},
    h('div',{style:{background:C.surface,borderRadius:'20px 20px 0 0',padding:'24px 20px 48px',width:'100%',maxWidth:430,border:'1px solid '+C.border,maxHeight:'85vh',overflowY:'auto'}},

        '1. Acesse jsonbin.io e crie uma conta',h('br'),

          h('div',{style:{display:'flex',justifyContent:'space-between'}},
            h('span',{style:{color:C.muted,fontSize:13}},cliNome(o.clienteId)),
            h('span',{style:{fontWeight:800,color:C.green}},'R$ '+fmtNum(totalItens(o.itens)))
          )
        ))
      )
    )
  );

  if(view==='detail'){
    const o=sel; const cur=data.orcamentos.find(x=>x.id===o.id)||o;
    return h('div',null,
      doc?h(DocModal,{doc,onClose:()=>setDoc(null)}):null,
      stMod?h(StatusModal,{title:'Status do Orcamento',current:cur.status,statuses:STATUS_ORC,onSelect:s=>changeStatus(o.id,s),onClose:()=>setStMod(null)}):null,
      h(TopBar,{title:o.numero,onBack:()=>{setView('list');setSel(null);},
        action:h('div',{style:{display:'flex',gap:6}},
          h(Btn,{small:true,outline:true,label:'WA',onClick:()=>abrirDoc(cur),icon:'wa',color:'#25D366'}),
          h(Btn,{small:true,outline:true,label:'Editar',onClick:()=>openEdit(cur),icon:'edit'})
        )
      }),
      h('div',{style:{padding:'14px 16px'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:10}},
          h(Badge,{...STATUS_ORC[cur.status]}),
          h('button',{onClick:()=>setStMod(o.id),style:{background:C.accentDim,border:'1px solid '+C.accent,borderRadius:8,padding:'6px 14px',color:C.accent,fontSize:14,fontWeight:700,cursor:'pointer'}},'Trocar status')
        ),
        h('div',{style:{color:C.muted,fontSize:13,marginBottom:10}},'Data: '+o.data+' - '+cliNome(o.clienteId)),
        ...cur.itens.map((it,i)=>h(Card,{key:i,style:{padding:'10px 14px'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
            h('div',null,h('div',{style:{fontWeight:600,color:C.text,fontSize:14}},it.desc),h('div',{style:{color:C.muted,fontSize:12,marginTop:2}},it.qtd+'x R$ '+fmtNum(parseBRL(it.unit||'0')))),
            h('span',{style:{fontWeight:700,color:C.green}},'R$ '+fmtNum(parseBRL(it.qtd||'0')*parseBRL(it.unit||'0')))
          )
        )),
        h('div',{style:{background:C.accentDim,borderRadius:12,padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}},
          h('span',{style:{fontWeight:700}},'Total'),
          h('span',{style:{color:C.green,fontWeight:900,fontSize:22}},'R$ '+fmtNum(totalItens(cur.itens)))
        ),
        cur.observacoes?h('div',null,h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,margin:'14px 0 8px'}},'OBSERVACOES'),h(Card,null,h('div',{style:{color:C.text,fontSize:14,lineHeight:1.6}},cur.observacoes))):null
      )
    );
  }

  return h('div',null,
    conf?h(ConfirmModal,{msg:'Excluir "'+sel?.numero+'"?',onOk:del,onCancel:()=>setConf(false)}):null,
    h(TopBar,{title:sel?'Editar Orçamento':'Novo Orçamento',onBack:()=>setView('list')}),
    h('div',{style:{padding:'14px 16px'}},
      h('div',{style:{marginBottom:14}},
        h('div',{style:{color:C.muted,fontSize:12,fontWeight:600,marginBottom:8,letterSpacing:0.5,textTransform:'uppercase'}},'Cliente'),
        data.clientes.length===0
          ?h('div',{style:{color:C.yellow,fontSize:14,padding:'10px 14px',background:C.yellow+'15',borderRadius:10,marginBottom:8}},'Nenhum cliente cadastrado.')
          :h('select',{value:form.clienteId,onChange:e=>f('clienteId')(e.target.value),style:{...inp_style,appearance:'none',WebkitAppearance:'none',marginBottom:8,color:form.clienteId?C.text:C.muted}},
              h('option',{value:''},'Selecione um cliente...'),
              data.clientes.map(c=>h('option',{key:c.id,value:c.id},c.nome+(c.telefone?' — '+c.telefone:'')))
            ),
        h('button',{onClick:onNovoCliente,style:{width:'100%',background:'transparent',border:'2px dashed '+C.accent,borderRadius:10,padding:10,color:C.accent,fontWeight:700,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}},
          h(Ic,{n:'plus',sz:16,c:C.accent}),' Cadastrar novo cliente'
        )
      ),
      h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,marginBottom:8}},'ITENS'),
      ...form.itens.map((it,i)=>h('div',{key:i,style:{background:C.surface,borderRadius:12,padding:12,marginBottom:8,border:'1px solid '+C.border}},
        h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:8}},
          h('span',{style:{color:C.muted,fontSize:12,fontWeight:700}},'ITEM '+(i+1)),
          form.itens.length>1?h('button',{onClick:()=>remItem(i),style:{background:'none',border:'none',cursor:'pointer',padding:2}},h(Ic,{n:'close',sz:16,c:C.red})):null
        ),
        h('input',{value:it.desc,onChange:e=>upItem(i,'desc',e.target.value),placeholder:'Descrição',style:{...inp_style,marginBottom:8}}),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
          h('div',null,h('div',{style:{color:C.muted,fontSize:11,marginBottom:4}},'Qtd'),h('input',{value:it.qtd,onChange:e=>upItem(i,'qtd',maskBRL(e.target.value)),inputMode:'numeric',placeholder:'0',style:inp_style})),
          h('div',null,h('div',{style:{color:C.muted,fontSize:11,marginBottom:4}},'Valor unit. (R$)'),h('input',{value:it.unit,onChange:e=>upItem(i,'unit',maskBRL(e.target.value)),inputMode:'numeric',placeholder:'0,00',style:inp_style}))
        ),
        it.qtd&&it.unit?h('div',{style:{textAlign:'right',color:C.green,fontSize:13,fontWeight:700,marginTop:6}},'R$ '+fmtNum(parseBRL(it.qtd)*parseBRL(it.unit))):null
      )),
      h('button',{onClick:addItem,style:{width:'100%',background:'transparent',border:'2px dashed '+C.border,borderRadius:12,padding:12,color:C.muted,fontWeight:700,fontSize:15,cursor:'pointer',marginBottom:14}},'+ Adicionar item'),
      h('div',{style:{background:C.accentDim,borderRadius:12,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
        h('span',{style:{fontWeight:700}},'Total'),
        h('span',{style:{color:C.green,fontWeight:900,fontSize:20}},'R$ '+fmtNum(totalItens(form.itens)))
      ),
      h(Sel,{label:'Status',value:form.status,onChange:f('status'),options:Object.entries(STATUS_ORC).map(([v,s])=>({v,l:s.label}))}),
      h(Field,{label:'Observações',value:form.observacoes,onChange:f('observacoes'),multiline:true,placeholder:'Validade, condições...'}),
      h('div',{style:{display:'flex',gap:10,marginTop:8,paddingBottom:140,justifyContent:'flex-end'}},
        sel?h(Btn,{small:true,label:'Excluir',onClick:()=>setConf(true),color:C.red,outline:true,icon:'trash'}):null,
        h(Btn,{small:true,label:'Salvar',onClick:save,color:C.green,icon:'check'})
      )
    )
  );
};

/* ═══ DASHBOARD ═══ */
const Dashboard = ({data,setTab,setData}) => {
  const [syncModal,setSyncModal] = useState(false);
  const syncOk = !!(getJbKey()&&getBinId());
  useEffect(()=>{ try{const k=localStorage.getItem('os_jbk');if(k)window._jbkey=k;}catch{} },[]);

  const Stat = ({label,value,color,tab}) =>
    h('div',{onClick:()=>setTab(tab),style:{background:C.card,borderRadius:14,padding:'14px 16px',border:'1px solid '+C.border,cursor:'pointer'}},
      h('div',{style:{fontSize:28,fontWeight:900,color}},value),
      h('div',{style:{color:C.muted,fontSize:12,fontWeight:600,marginTop:2}},label)
    );

  return h('div',null,
    syncModal?h(SyncModal,{onClose:()=>setSyncModal(false),setData,data}):null,
    h('div',{style:{background:C.bg,borderBottom:'1px solid '+C.border,padding:'10px 16px 8px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
      h('img',{src:LOGO_SRC,alt:'Point Tech',style:{height:56,objectFit:'contain',display:'block'}}),
      h('button',{onClick:()=>setSyncModal(true),style:{background:syncOk?C.green+'22':'#2a1a1a',border:'1px solid '+(syncOk?C.green:C.red),borderRadius:10,padding:'6px 12px',color:syncOk?C.green:C.red,fontSize:12,fontWeight:700,cursor:'pointer'}},syncOk?'Sync':'Sync')
    ),
    h('div',{style:{padding:'16px 16px'}},
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}},
        h(Stat,{label:'OS Abertas',value:data.ordens.filter(o=>o.status==='aberta').length,color:C.yellow,tab:'os'}),
        h(Stat,{label:'Em andamento',value:data.ordens.filter(o=>o.status==='em_andamento').length,color:C.accent,tab:'os'}),
        h(Stat,{label:'Concluidas',value:data.ordens.filter(o=>['concluida','entregue'].includes(o.status)).length,color:C.green,tab:'os'}),
        h(Stat,{label:'Orc. Pendentes',value:data.orcamentos.filter(o=>o.status==='pendente').length,color:C.yellow,tab:'orc'})
      ),
      h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,marginBottom:10}},'RECENTES'),
      data.ordens.length===0?h(Empty,{msg:'Nenhuma OS. Comece cadastrando um cliente!'}):
      data.ordens.slice(-4).reverse().map(o=>{
        const c=data.clientes.find(cl=>cl.id===o.clienteId);
        return h(Card,{key:o.id,onClick:()=>setTab('os')},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
            h('div',{style:{flex:1,minWidth:0,marginRight:8}},
              h('div',{style:{fontWeight:700,fontSize:14,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},o.descricao),
              h('div',{style:{color:C.muted,fontSize:12,marginTop:2}},(c?.nome||'—')+' · '+o.data)
            ),
            h(Badge,{...STATUS_OS[o.status]})
          )
        );
      })
    )
  );
};

/* ═══ APP ROOT ═══ */
function App() {
  const [tab,setTab] = useState('home');
  const [data,setData] = useState(loadData);
  useEffect(()=>{ saveData(data); },[data]);

  const tabs = [
    {id:'home',     label:'Painel',    icon:'home'  },
    {id:'clientes', label:'Clientes',  icon:'users' },
    {id:'produtos', label:'Produtos',  icon:'box'   },
    {id:'servicos', label:'Serviços',  icon:'tool'  },
    {id:'os',       label:'OS',        icon:'wrench'},
    {id:'orc',      label:'Orç.',      icon:'dollar'},
  ];

  return h('div',{style:{background:C.bg,minHeight:'100vh',maxWidth:430,margin:'0 auto',fontFamily:"-apple-system,'Inter',sans-serif",color:C.text}},
    h('div',{style:{paddingBottom:72}},
      tab==='home'    ?h(Dashboard, {data,setTab,setData}):null,
      tab==='os'      ?h(Ordens,    {data,setData,onNovoCliente:()=>setTab('clientes')}):null,
      tab==='orc'     ?h(Orcamentos,{data,setData,onNovoCliente:()=>setTab('clientes')}):null,
      tab==='clientes'?h(Clientes,  {data,setData}):null,
      tab==='produtos'?h(Produtos,  {data,setData}):null,
      tab==='servicos'?h(Servicos,  {data,setData}):null,
    ),
    h('div',{style:{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,background:C.surface,borderTop:'1px solid '+C.border,display:'flex',zIndex:100,paddingBottom:'env(safe-area-inset-bottom)'}},
      tabs.map(t=>h('button',{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,background:'none',border:'none',cursor:'pointer',padding:'8px 0 10px',display:'flex',flexDirection:'column',alignItems:'center',gap:3,color:tab===t.id?C.accent:C.muted}},
        h(Ic,{n:t.icon,sz:20,c:tab===t.id?C.accent:C.muted}),
        h('span',{style:{fontSize:9,fontWeight:700,letterSpacing:0.2}},t.label)
      ))
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));

  </script>
</body>
