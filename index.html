/* ── SINCRONIZACAO AUTOMATICA E INSTANTANEA (Firebase Realtime Database) ──
   URL fixa embutida no app. Nao exige nenhuma configuracao do usuario.
   Usa o stream SSE do Firebase para receber mudancas em tempo real, sem polling. */
const FB_BASE = 'https://pointtechos-default-rtdb.firebaseio.com';
const FB_PATH = '/pointtech_dados.json';
window._syncStatus = {ok:null,msg:''};
window._lastRemoteJson = '';
window._suppressNextSave = false; // evita re-enviar o que acabou de chegar via stream

const loadCloud = async () => {
  try{
    const r = await fetch(FB_BASE+FB_PATH);
    if(!r.ok){ window._syncStatus={ok:false,msg:'Erro '+r.status}; return null; }
    const txt = await r.text();
    if(txt==='null'||!txt){ window._syncStatus={ok:false,msg:'Sem dados na nuvem ainda'}; return null; }
    const d = JSON.parse(txt);
    window._lastRemoteJson = JSON.stringify(d);
    window._syncStatus={ok:true,msg:'ok'};
    return {...EMPTY,...d};
  }catch(e){ window._syncStatus={ok:false,msg:e.message}; return null; }
};

const saveCloud = async (data) => {
  const json = JSON.stringify(data);
  if(json===window._lastRemoteJson) return;
  try{
    const r = await fetch(FB_BASE+FB_PATH, {method:'PUT', headers:{'Content-Type':'application/json'}, body:json});
    if(!r.ok){ window._syncStatus={ok:false,msg:'Erro '+r.status}; return; }
    window._lastRemoteJson = json;
    window._syncStatus={ok:true,msg:'ok'};
  }catch(e){ window._syncStatus={ok:false,msg:e.message}; }
};

// Stream de eventos em tempo real do Firebase (Server-Sent Events).
// Chama onUpdate(novosDados) instantaneamente quando QUALQUER dispositivo salva.
const streamCloud = (onUpdate) => {
  let es;
  try{
    es = new EventSource(FB_BASE+FB_PATH+'?ndjson=false', {});
  }catch(e){ return null; }
  es.addEventListener('put', (ev)=>{
    try{
      const payload = JSON.parse(ev.data);
      const val = payload && payload.data!==undefined ? payload.data : null;
      if(val){
        const json = JSON.stringify(val);
        if(json!==window._lastRemoteJson){
          window._lastRemoteJson = json;
          onUpdate({...EMPTY,...val});
        }
      }
    }catch(e){}
  });
  es.addEventListener('patch', (ev)=>{
    try{
      const payload = JSON.parse(ev.data);
      if(payload && payload.data){
        loadCloud().then(d=>{ if(d) onUpdate(d); });
      }
    }catch(e){}
  });
  es.onerror = () => { /* o navegador tenta reconectar automaticamente */ };
  return es;
};

const loadData = () => loadLocal()||EMPTY;
const saveData = (d) => { saveLocal(d); saveCloud(d); };

/* ── FACE ID / TOUCH ID (WebAuthn) ── */
const WEBAUTHN_KEY = 'os_webauthn_cred_v1';
const isWebAuthnSupported = () => !!(window.PublicKeyCredential && navigator.credentials);
const getStoredCredId = () => { try{return localStorage.getItem(WEBAUTHN_KEY)||'';}catch{return '';} };
const setStoredCredId = (id) => { try{localStorage.setItem(WEBAUTHN_KEY,id);}catch{} };

const registerBiometric = async (username) => {
  if(!isWebAuthnSupported()) return {ok:false,msg:'Face ID/Touch ID nao disponivel neste navegador'};
  try{
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);
    const userId = new Uint8Array(16);
    crypto.getRandomValues(userId);
    const cred = await navigator.credentials.create({
      publicKey:{
        challenge,
        rp:{ name:'Point Tech OS' },
        user:{ id:userId, name:username, displayName:username },
        pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
        authenticatorSelection:{ authenticatorAttachment:'platform', userVerification:'required' },
        timeout:60000,
      }
    });
    if(cred && cred.id){ setStoredCredId(cred.id); return {ok:true}; }
    return {ok:false,msg:'Nao foi possivel registrar'};
  }catch(e){ return {ok:false,msg:e.message||'Erro ao configurar Face ID/Touch ID'}; }
};

const verifyBiometric = async () => {
  if(!isWebAuthnSupported()) return {ok:false,msg:'Face ID/Touch ID nao disponivel'};
  const credId = getStoredCredId();
  if(!credId) return {ok:false,msg:'Face ID/Touch ID nao configurado'};
  try{
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);
    const idBytes = Uint8Array.from(credId.match(/.{1,2}/g)?credId.match(/.{1,2}/g).map(b=>parseInt(b,16)):[]);
    const assertion = await navigator.credentials.get({
      publicKey:{
        challenge,
        allowCredentials:[{id:new TextEncoder().encode(credId), type:'public-key', transports:['internal']}],
        userVerification:'required',
        timeout:60000,
      }
    }).catch(async()=>{
      // Fallback simples: alguns navegadores aceitam sem allowCredentials especifico
      return await navigator.credentials.get({publicKey:{challenge,userVerification:'required',timeout:60000}});
    });
    if(assertion) return {ok:true};
    return {ok:false,msg:'Verificacao falhou'};
  }catch(e){ return {ok:false,msg:e.message||'Erro na verificacao biometrica'}; }
};

const buscarCnpj = async (cnpj, onFound, setMsg) => {
  const digits = cnpj.replace(/\D/g,'');
  if(digits.length!==14){ setMsg({t:'CNPJ deve ter 14 digitos',ok:false}); return; }
  setMsg({t:'Buscando dados do CNPJ...',ok:null});
  try{
    const r = await fetch('https://brasilapi.com.br/api/cnpj/v1/'+digits);
    if(!r.ok){ setMsg({t:'CNPJ nao encontrado',ok:false}); return; }
    const d = await r.json();
    onFound({
      nome: d.razao_social || d.nome_fantasia || '',
      telefone: d.ddd_telefone_1 ? d.ddd_telefone_1 : '',
      celular: d.ddd_telefone_2 ? d.ddd_telefone_2 : '',
      email: d.email || '',
      cep: d.cep || '',
      logradouro: (d.descricao_tipo_de_logradouro?d.descricao_tipo_de_logradouro+' ':'')+(d.logradouro||''),
      numero: d.numero || '',
      complemento: d.complemento || '',
      bairro: d.bairro || '',
      cidade: d.municipio || '',
      estado: d.uf || '',
    });
    setMsg({t:'Dados da empresa preenchidos!',ok:true});
  }catch(e){ setMsg({t:'Erro ao buscar CNPJ. Preencha manualmente.',ok:false}); }
};

const buscarCep = (cep, onFound, setMsg) => {
  const digits = cep.replace(/\D/g,'');
  if(digits.length!==8){setMsg({t:'CEP deve ter 8 digitos',ok:false});return;}
  setMsg({t:'Buscando...',ok:null});
  const cbName = '_vc_'+Date.now();
  const tid = setTimeout(()=>{
    try{delete window[cbName];}catch{}
    const s=document.getElementById(cbName); if(s)s.remove();
    // fallback local
    const p5=digits.slice(0,5),p4=digits.slice(0,4),p3=digits.slice(0,3);
    const m=PR_CEPS[p5]||PR_CEPS[p4]||PR_CEPS[p3];
    if(m){onFound({logradouro:'',bairro:m[0],localidade:m[1],uf:'PR'});setMsg({t:'Cidade e bairro preenchidos!',ok:true});}
    else setMsg({t:'CEP nao encontrado. Preencha manualmente.',ok:false});
  },5000);
  window[cbName]=(d)=>{
    clearTimeout(tid); try{delete window[cbName];}catch{}
    const s=document.getElementById(cbName); if(s)s.remove();
    if(d&&!d.erro){onFound({logradouro:d.logradouro||'',bairro:d.bairro||'',localidade:d.localidade||'',uf:d.uf||'PR'});setMsg({t:d.logradouro?'Endereço completo!':'Cidade e bairro preenchidos!',ok:true});}
    else{
      const p5=digits.slice(0,5),p4=digits.slice(0,4),p3=digits.slice(0,3);
      const m=PR_CEPS[p5]||PR_CEPS[p4]||PR_CEPS[p3];
      if(m){onFound({logradouro:'',bairro:m[0],localidade:m[1],uf:'PR'});setMsg({t:'Cidade e bairro preenchidos!',ok:true});}
      else setMsg({t:'CEP nao encontrado.',ok:false});
    }
  };
  const sc=document.createElement('script'); sc.id=cbName;
  sc.src='https://viacep.com.br/ws/'+digits+'/json/?callback='+cbName;
  sc.onerror=()=>{clearTimeout(tid);try{delete window[cbName];}catch{};sc.remove();setMsg({t:'Servico indisponivel.',ok:false});};
  document.head.appendChild(sc);
};

  t+='No: '+numero+'\nCliente: '+cliNome+'\nStatus: '+status+'\n';
  if(descricao) t+='Servico: '+descricao+'\n';
  if(itens&&itens.length){t+='\nItens:\n';itens.forEach(i=>{const s=parseBRL(i.qtd||'0')*parseBRL(i.unit||'0');t+='  * '+i.desc+' ('+i.qtd+'x R$ '+fmtNum(parseBRL(i.unit||'0'))+') = R$ '+fmtNum(s)+'\n';});}

  if(obs) t+='\nObs: '+obs+'\n';

  return t;
};

const PressCard = ({children,style:cs={},onTap,onLong}) => {
  const timer=useRef(null),fired=useRef(false),startY=useRef(0);
  const onTS=(e)=>{fired.current=false;startY.current=e.touches[0].clientY;timer.current=setTimeout(()=>{fired.current=true;onLong&&onLong();},600);};
  const onTE=(e)=>{clearTimeout(timer.current);const dy=Math.abs(e.changedTouches[0].clientY-startY.current);if(!fired.current&&dy<8)onTap&&onTap();};
  const onTM=(e)=>{if(Math.abs(e.touches[0].clientY-startY.current)>8)clearTimeout(timer.current);};
  return h('div',{onTouchStart:onTS,onTouchEnd:onTE,onTouchMove:onTM,onClick:onTap,
    style:{background:C.card,borderRadius:14,padding:'14px 16px',border:'1px solid '+C.border,marginBottom:10,cursor:'pointer',userSelect:'none',WebkitUserSelect:'none',...cs}},children);
};

const DocModal = ({doc,onClose}) => {
  if(!doc) return null;

      const blob = new Blob([doc.html], {type:'text/html'});

      const w = window.open(url, '_blank');
      if(!w){
        // Popup bloqueado - navega na mesma aba (usuario volta pelo botao Fechar do PDF ou gesto do Safari)
        window.location.href = url;
      }
    } catch(e) {
      const w=window.open('','_blank');
      if(w){w.document.open();w.document.write(doc.html);w.document.close();}
    }
  };
  const enviarWA = () => { const tel=(doc.tel||'').replace(/\D/g,''); const msg=encodeURIComponent(doc.waText||''); window.open(tel?'https://wa.me/55'+tel+'?text='+msg:'https://wa.me/?text='+msg,'_blank'); };

        h('strong',{style:{color:C.text,display:'block',marginBottom:4}},'Como enviar o PDF pelo WhatsApp:'),
        '1. Toque em "Abrir documento"',h('br'),'2. No documento, toque em "Compartilhar / WhatsApp"',h('br'),'3. Para voltar, toque em "Fechar" no topo do documento ou deslize da borda esquerda da tela'

        h('button',{onClick:abrirDoc,style:{width:'100%',background:C.accent,border:'none',borderRadius:14,padding:15,color:'#fff',fontWeight:800,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10}},

      )
    )
  );
};

const DocField = ({value,onChange,onFoundCnpj}) => {
  const [msg,setMsg] = useState(null);

  const handleChange = (e) => {
    const v = maskDoc(e.target.value);
    onChange(v);

/* ═══ ORDENS ═══ */
const BLANK_OS={clienteId:'',equipamento:'',descricao:'',produtosOS:[],servicosOS:[],valor:'',status:'aberta',observacoes:'',tecnico:'Tiago Roberto de Oliveira'};
const Ordens = ({data,setData,onNovoCliente}) => {
  const [view,setView]=useState('list');const [sel,setSel]=useState(null);const [form,setForm]=useState(BLANK_OS);
  const [conf,setConf]=useState(false);const [stMod,setStMod]=useState(null);const [doc,setDoc]=useState(null);
  const f=k=>v=>setForm(p=>({...p,[k]:v}));
  const cliNome=id=>data.clientes.find(c=>c.id===id)?.nome||'—';
  const nextNum=()=>'OS-'+String(1250+data.ordens.length);

  const totalItensOS = (frm) => {
    const tp=(frm.produtosOS||[]).reduce((s,i)=>s+parseBRL(i.qtd||'0')*parseBRL(i.unit||'0'),0);
    const ts=(frm.servicosOS||[]).reduce((s,i)=>s+parseBRL(i.qtd||'0')*parseBRL(i.unit||'0'),0);
    return tp+ts;
  };

  const openNew=()=>{setForm({...BLANK_OS,clienteId:'',produtosOS:[],servicosOS:[]});setSel(null);setView('form');};
  const openEdit=o=>{setForm({...BLANK_OS,...o,tecnico:o.tecnico||BLANK_OS.tecnico,produtosOS:o.produtosOS?o.produtosOS.map(i=>({...i})):[],servicosOS:o.servicosOS?o.servicosOS.map(i=>({...i})):[]});setSel(o);setView('form');};

  const addProdutoOS = (p) => setForm(prev=>({...prev,produtosOS:[...prev.produtosOS,{nome:p.nome,qtd:'1',unit:p.preco?fmtNum(parseBRL(p.preco)):'0,00'}]}));
  const addServicoOS = (s) => setForm(prev=>({...prev,servicosOS:[...prev.servicosOS,{nome:s.nome,qtd:'1',unit:s.preco?fmtNum(parseBRL(s.preco)):'0,00'}]}));
  const remProdutoOS = (i) => setForm(prev=>({...prev,produtosOS:prev.produtosOS.filter((_,idx)=>idx!==i)}));
  const remServicoOS = (i) => setForm(prev=>({...prev,servicosOS:prev.servicosOS.filter((_,idx)=>idx!==i)}));
  const upProdutoOS = (i,k,v) => setForm(prev=>({...prev,produtosOS:prev.produtosOS.map((it,idx)=>idx===i?{...it,[k]:v}:it)}));
  const upServicoOS = (i,k,v) => setForm(prev=>({...prev,servicosOS:prev.servicosOS.map((it,idx)=>idx===i?{...it,[k]:v}:it)}));

  const save=()=>{
    if(!form.descricao.trim()||!form.clienteId)return;
    const total = totalItensOS(form);
    const finalForm = {...form, valor: total>0?fmtNum(total):form.valor};
    setData(p=>{const ordens=sel?p.ordens.map(o=>o.id===sel.id?{...finalForm,id:sel.id,numero:sel.numero,data:sel.data}:o):[...p.ordens,{...finalForm,id:newId(),numero:nextNum(),data:today()}];return{...p,ordens};});
    setView('list');
  };
  const del=()=>{setData(p=>({...p,ordens:p.ordens.filter(o=>o.id!==sel.id)}));setConf(false);setView('list');};
  const changeStatus=(id,status)=>{setData(p=>({...p,ordens:p.ordens.map(o=>o.id===id?{...o,status}:o)}));setSel(p=>p?.id===id?{...p,status}:p);setStMod(null);};
  const abrirDoc=(o)=>{
    const cli=data.clientes.find(c=>c.id===o.clienteId);
    const prodList=(o.produtosOS||[]).map(p=>({desc:p.nome,qtd:p.qtd,unit:p.unit}));
    const servList=(o.servicosOS&&o.servicosOS.length)?o.servicosOS.map(s=>({desc:s.nome,qtd:s.qtd,unit:s.unit})):[{desc:o.descricao,qtd:'1',unit:o.valor||'0'}];
    const html=buildPdf('Ordem de Serviço',o.numero,STATUS_OS[o.status]?.label,cli,prodList,servList,o.equipamento||o.descricao,parseBRL(o.valor),o.observacoes,o.data,o.tecnico);
    const waText=textoWA('OS',o.numero,STATUS_OS[o.status]?.label,cli?.nome||'—',o.descricao,o.valor,null,o.observacoes);
    setDoc({html,numero:o.numero,tel:cli?.telefone||'',waText});
  };

  if(view==='list') return h('div',null,
    doc?h(DocModal,{doc,onClose:()=>setDoc(null)}):null,
    stMod?h(StatusModal,{title:'Status da OS',current:data.ordens.find(o=>o.id===stMod)?.status,statuses:STATUS_OS,onSelect:s=>changeStatus(stMod,s),onClose:()=>setStMod(null)}):null,
    h(TopBar,{title:'Ordens de Serviço',action:h(Btn,{small:true,label:'Nova OS',onClick:openNew,icon:'plus'})}),
    h('div',{style:{padding:'12px 16px'}},
      data.ordens.length===0?h(Empty,{msg:'Nenhuma OS'}):

        h('div',{style:{textAlign:'center',color:C.muted,fontSize:11,paddingBottom:8}},'Toque para abrir · Segure para mudar status'),
        ...data.ordens.map(o=>h(PressCard,{key:o.id,onTap:()=>{setSel({...o});setView('detail');},onLong:()=>setStMod(o.id)},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}},

            h('span',{style:{color:C.muted,fontSize:13}},cliNome(o.clienteId)),

  if(view==='detail'){

    const waNum=(cli&&(cli.celular||cli.telefone))?(cli.celular||cli.telefone).replace(/\D/g,''):'';
    const conversarCliente=()=>{ if(waNum) window.open('https://wa.me/55'+waNum,'_blank'); };
    return h('div',null,
      doc?h(DocModal,{doc,onClose:()=>setDoc(null)}):null,
      stMod?h(StatusModal,{title:'Status da OS',current:cur.status,statuses:STATUS_OS,onSelect:s=>changeStatus(o.id,s),onClose:()=>setStMod(null)}):null,
      h(TopBar,{title:o.numero,onBack:()=>{setView('list');setSel(null);},
        action:h('div',{style:{display:'flex',gap:6}},
          h(Btn,{small:true,outline:true,label:'PDF',onClick:()=>abrirDoc(cur),icon:'wa',color:'#25D366'}),
          h(Btn,{small:true,outline:true,label:'Editar',onClick:()=>openEdit(cur),icon:'edit'})
        )
      }),
      h('div',{style:{padding:'14px 16px'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:14}},
          h(Badge,{...STATUS_OS[cur.status]}),
          h('button',{onClick:()=>setStMod(o.id),style:{background:C.accentDim,border:'1px solid '+C.accent,borderRadius:8,padding:'6px 14px',color:C.accent,fontSize:14,fontWeight:700,cursor:'pointer'}},'Trocar status')
        ),
        h('div',{style:{fontSize:19,fontWeight:800,color:C.text,marginBottom:4}},cur.descricao),
        cur.equipamento?h('div',{style:{color:C.muted,fontSize:13,marginBottom:4}},'Equipamento: '+cur.equipamento):null,
        h('div',{style:{color:C.muted,fontSize:13,marginBottom:16}},cur.data),
        h(Card,{style:{padding:'12px 16px'}},h('div',{style:{display:'flex',justifyContent:'space-between'}},h('span',{style:{color:C.muted,fontSize:13}},'Cliente'),h('span',{style:{fontWeight:700}},cliNome(o.clienteId)))),
        (cur.produtosOS&&cur.produtosOS.length>0)?h('div',null,h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,margin:'14px 0 8px'}},'PRODUTOS'),
          ...cur.produtosOS.map((p,i)=>h(Card,{key:i,style:{padding:'10px 14px'}},h('div',{style:{display:'flex',justifyContent:'space-between'}},h('span',{style:{fontSize:14}},p.nome+' ('+p.qtd+'x)'),h('span',{style:{fontWeight:700,color:C.green}},'R$ '+fmtNum(parseBRL(p.qtd)*parseBRL(p.unit))))))
        ):null,
        (cur.servicosOS&&cur.servicosOS.length>0)?h('div',null,h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,margin:'14px 0 8px'}},'SERVIÇOS'),
          ...cur.servicosOS.map((s,i)=>h(Card,{key:i,style:{padding:'10px 14px'}},h('div',{style:{display:'flex',justifyContent:'space-between'}},h('span',{style:{fontSize:14}},s.nome+' ('+s.qtd+'x)'),h('span',{style:{fontWeight:700,color:C.green}},'R$ '+fmtNum(parseBRL(s.qtd)*parseBRL(s.unit))))))
        ):null,
        h(Card,{style:{padding:'12px 16px',marginTop:8}},h('div',{style:{display:'flex',justifyContent:'space-between'}},h('span',{style:{color:C.muted,fontSize:13}},'Valor Total'),h('span',{style:{fontWeight:800,color:C.green,fontSize:18}},'R$ '+fmtNum(parseBRL(cur.valor))))),
        cur.observacoes?h('div',null,h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,margin:'14px 0 8px'}},'OBSERVAÇÕES'),h(Card,null,h('div',{style:{color:C.text,fontSize:14,lineHeight:1.6}},cur.observacoes))):null,
        waNum?h('button',{onClick:conversarCliente,style:{marginTop:18,background:'#25D366',border:'none',borderRadius:12,padding:'10px 18px',color:'#fff',fontWeight:700,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}},h(Ic,{n:'wa',sz:16,c:'#fff'}),' Conversar com cliente'):null
      )
    );
  }

  const totalOS = totalItensOS(form);

  return h('div',null,
    conf?h(ConfirmModal,{msg:'Excluir "'+sel?.numero+'"?',onOk:del,onCancel:()=>setConf(false)}):null,
    h(TopBar,{title:sel?'Editar OS':'Nova OS',onBack:()=>setView('list')}),
    h('div',{style:{padding:'14px 16px'}},
      h('div',{style:{marginBottom:14}},
        h('div',{style:{color:C.muted,fontSize:12,fontWeight:600,marginBottom:8,letterSpacing:0.5,textTransform:'uppercase'}},'Cliente'),
        data.clientes.length===0
          ?h('div',{style:{color:C.yellow,fontSize:14,padding:'10px 14px',background:C.yellow+'15',borderRadius:10,marginBottom:8}},'Nenhum cliente cadastrado.')
          :h('select',{value:form.clienteId,onChange:e=>f('clienteId')(e.target.value),style:{...inp_style,appearance:'none',WebkitAppearance:'none',marginBottom:8,color:form.clienteId?C.text:C.muted}},
              h('option',{value:''},'Selecione um cliente...'),
              data.clientes.map(c=>h('option',{key:c.id,value:c.id},c.nome+(c.telefone?' — '+c.telefone:'')))
            ),
        h('button',{onClick:onNovoCliente,style:{width:'100%',background:'transparent',border:'2px dashed '+C.accent,borderRadius:10,padding:10,color:C.accent,fontWeight:700,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}},

      h(Field,{label:'Equipamento',value:form.equipamento,onChange:f('equipamento'),placeholder:'Ex: iPhone 13, Notebook Dell...'}),

        h('option',{value:''},'+ Adicionar produto...'),
        data.produtos.map(p=>h('option',{key:p.id,value:p.id},p.nome+(p.preco?' — R$ '+fmtNum(parseBRL(p.preco)):'')))
      ),
      ...form.produtosOS.map((it,i)=>h('div',{key:i,style:{background:C.surface,borderRadius:12,padding:10,marginBottom:8,border:'1px solid '+C.border}},
        h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:6}},
          h('span',{style:{fontWeight:700,fontSize:13,color:C.text}},it.nome),
          h('button',{onClick:()=>remProdutoOS(i),style:{background:'none',border:'none',cursor:'pointer',padding:2}},h(Ic,{n:'close',sz:14,c:C.red}))
        ),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
          h('input',{value:it.qtd,onChange:e=>upProdutoOS(i,'qtd',maskBRL(e.target.value)),inputMode:'numeric',placeholder:'Qtd',style:{...inp_style,padding:'8px 10px',fontSize:14}}),
          h('input',{value:it.unit,onChange:e=>upProdutoOS(i,'unit',maskBRL(e.target.value)),inputMode:'numeric',placeholder:'Valor',style:{...inp_style,padding:'8px 10px',fontSize:14}})

      h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,marginBottom:8,marginTop:14}},'SERVIÇOS'),

      h('select',{value:'',onChange:e=>{const s=data.servicos.find(x=>x.id===e.target.value);if(s)addServicoOS(s);},style:{...inp_style,marginBottom:10,appearance:'none',WebkitAppearance:'none'}},
        h('option',{value:''},'+ Adicionar serviço...'),
        data.servicos.map(s=>h('option',{key:s.id,value:s.id},s.nome+(s.preco?' — R$ '+fmtNum(parseBRL(s.preco)):'')))
      ),
      ...form.servicosOS.map((it,i)=>h('div',{key:i,style:{background:C.surface,borderRadius:12,padding:10,marginBottom:8,border:'1px solid '+C.border}},
        h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:6}},
          h('span',{style:{fontWeight:700,fontSize:13,color:C.text}},it.nome),
          h('button',{onClick:()=>remServicoOS(i),style:{background:'none',border:'none',cursor:'pointer',padding:2}},h(Ic,{n:'close',sz:14,c:C.red}))
        ),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
          h('input',{value:it.qtd,onChange:e=>upServicoOS(i,'qtd',maskBRL(e.target.value)),inputMode:'numeric',placeholder:'Qtd',style:{...inp_style,padding:'8px 10px',fontSize:14}}),
          h('input',{value:it.unit,onChange:e=>upServicoOS(i,'unit',maskBRL(e.target.value)),inputMode:'numeric',placeholder:'Valor',style:{...inp_style,padding:'8px 10px',fontSize:14}})
        )
      )),

      totalOS>0?h('div',{style:{background:C.accentDim,borderRadius:12,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8,marginBottom:14}},
        h('span',{style:{fontWeight:700}},'Total (produtos + serviços)'),
        h('span',{style:{color:C.green,fontWeight:900,fontSize:18}},'R$ '+fmtNum(totalOS))
      ):null,

      h(ValorField,{label:totalOS>0?'Valor (substituido pelo total acima)':'Valor',value:form.valor,onChange:f('valor')}),

      h('div',{style:{display:'flex',gap:10,marginTop:8,paddingBottom:140,justifyContent:'flex-end'}},
        sel?h(Btn,{small:true,label:'Excluir',onClick:()=>setConf(true),color:C.red,outline:true,icon:'trash'}):null,
        h(Btn,{small:true,label:'Salvar',onClick:save,color:C.green,icon:'check',disabled:!form.descricao.trim()||!form.clienteId})
      )
    )
  );

    doc?h(DocModal,{doc,onClose:()=>setDoc(null)}):null,

      h('div',null,
        h('div',{style:{textAlign:'center',color:C.muted,fontSize:11,paddingBottom:8}},'Toque para abrir · Segure para mudar status'),
        ...data.orcamentos.map(o=>h(PressCard,{key:o.id,onTap:()=>{setSel({...o});setView('detail');},onLong:()=>setStMod(o.id)},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}},
            h('span',{style:{fontWeight:800,color:C.accent,fontSize:14}},o.numero),

          ),
          h('div',{style:{display:'flex',justifyContent:'space-between'}},
            h('span',{style:{color:C.muted,fontSize:13}},cliNome(o.clienteId)),
            h('span',{style:{fontWeight:800,color:C.green}},'R$ '+fmtNum(totalItens(o.itens)))
          )
        ))
      )
    )
  );

  if(view==='detail'){
    const o=sel; const cur=data.orcamentos.find(x=>x.id===o.id)||o;
    const cli=data.clientes.find(c=>c.id===o.clienteId);
    const waNum=(cli&&(cli.celular||cli.telefone))?(cli.celular||cli.telefone).replace(/\D/g,''):'';
    const conversarCliente=()=>{ if(waNum) window.open('https://wa.me/55'+waNum,'_blank'); };
    return h('div',null,
      doc?h(DocModal,{doc,onClose:()=>setDoc(null)}):null,
      stMod?h(StatusModal,{title:'Status do Orcamento',current:cur.status,statuses:STATUS_ORC,onSelect:s=>changeStatus(o.id,s),onClose:()=>setStMod(null)}):null,
      h(TopBar,{title:o.numero,onBack:()=>{setView('list');setSel(null);},
        action:h('div',{style:{display:'flex',gap:6}},
          h(Btn,{small:true,outline:true,label:'PDF',onClick:()=>abrirDoc(cur),icon:'wa',color:'#25D366'}),
          h(Btn,{small:true,outline:true,label:'Editar',onClick:()=>openEdit(cur),icon:'edit'})
        )
      }),
      h('div',{style:{padding:'14px 16px'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:10}},
          h(Badge,{...STATUS_ORC[cur.status]}),
          h('button',{onClick:()=>setStMod(o.id),style:{background:C.accentDim,border:'1px solid '+C.accent,borderRadius:8,padding:'6px 14px',color:C.accent,fontSize:14,fontWeight:700,cursor:'pointer'}},'Trocar status')
        ),
        h('div',{style:{color:C.muted,fontSize:13,marginBottom:10}},'Data: '+o.data+' - '+cliNome(o.clienteId)),
        ...cur.itens.map((it,i)=>h(Card,{key:i,style:{padding:'10px 14px'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
            h('div',null,h('div',{style:{fontWeight:600,color:C.text,fontSize:14}},it.desc),h('div',{style:{color:C.muted,fontSize:12,marginTop:2}},it.qtd+'x R$ '+fmtNum(parseBRL(it.unit||'0')))),
            h('span',{style:{fontWeight:700,color:C.green}},'R$ '+fmtNum(parseBRL(it.qtd||'0')*parseBRL(it.unit||'0')))
          )
        )),
        h('div',{style:{background:C.accentDim,borderRadius:12,padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}},
          h('span',{style:{fontWeight:700}},'Total'),
          h('span',{style:{color:C.green,fontWeight:900,fontSize:22}},'R$ '+fmtNum(totalItens(cur.itens)))
        ),
        cur.observacoes?h('div',null,h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,margin:'14px 0 8px'}},'OBSERVAÇÕES'),h(Card,null,h('div',{style:{color:C.text,fontSize:14,lineHeight:1.6}},cur.observacoes))):null,
        waNum?h('button',{onClick:conversarCliente,style:{marginTop:18,background:'#25D366',border:'none',borderRadius:12,padding:'10px 18px',color:'#fff',fontWeight:700,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}},h(Ic,{n:'wa',sz:16,c:'#fff'}),' Conversar com cliente'):null
      )
    );
  }

  return h('div',null,
    conf?h(ConfirmModal,{msg:'Excluir "'+sel?.numero+'"?',onOk:del,onCancel:()=>setConf(false)}):null,
    h(TopBar,{title:sel?'Editar Orçamento':'Novo Orçamento',onBack:()=>setView('list')}),
    h('div',{style:{padding:'14px 16px'}},
      h('div',{style:{marginBottom:14}},
        h('div',{style:{color:C.muted,fontSize:12,fontWeight:600,marginBottom:8,letterSpacing:0.5,textTransform:'uppercase'}},'Cliente'),
        data.clientes.length===0
          ?h('div',{style:{color:C.yellow,fontSize:14,padding:'10px 14px',background:C.yellow+'15',borderRadius:10,marginBottom:8}},'Nenhum cliente cadastrado.')
          :h('select',{value:form.clienteId,onChange:e=>f('clienteId')(e.target.value),style:{...inp_style,appearance:'none',WebkitAppearance:'none',marginBottom:8,color:form.clienteId?C.text:C.muted}},
              h('option',{value:''},'Selecione um cliente...'),
              data.clientes.map(c=>h('option',{key:c.id,value:c.id},c.nome+(c.telefone?' — '+c.telefone:'')))
            ),
        h('button',{onClick:onNovoCliente,style:{width:'100%',background:'transparent',border:'2px dashed '+C.accent,borderRadius:10,padding:10,color:C.accent,fontWeight:700,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}},
          h(Ic,{n:'plus',sz:16,c:C.accent}),' Cadastrar novo cliente'
        )
      ),
      h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,marginBottom:8}},'ITENS'),
      ...form.itens.map((it,i)=>h('div',{key:i,style:{background:C.surface,borderRadius:12,padding:12,marginBottom:8,border:'1px solid '+C.border}},
        h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:8}},
          h('span',{style:{color:C.muted,fontSize:12,fontWeight:700}},'ITEM '+(i+1)),
          form.itens.length>1?h('button',{onClick:()=>remItem(i),style:{background:'none',border:'none',cursor:'pointer',padding:2}},h(Ic,{n:'close',sz:16,c:C.red})):null
        ),
        h('input',{value:it.desc,onChange:e=>upItem(i,'desc',e.target.value),placeholder:'Descrição',style:{...inp_style,marginBottom:8}}),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
          h('div',null,h('div',{style:{color:C.muted,fontSize:11,marginBottom:4}},'Qtd'),h('input',{value:it.qtd,onChange:e=>upItem(i,'qtd',maskBRL(e.target.value)),inputMode:'numeric',placeholder:'0',style:inp_style})),
          h('div',null,h('div',{style:{color:C.muted,fontSize:11,marginBottom:4}},'Valor unit. (R$)'),h('input',{value:it.unit,onChange:e=>upItem(i,'unit',maskBRL(e.target.value)),inputMode:'numeric',placeholder:'0,00',style:inp_style}))
        ),
        it.qtd&&it.unit?h('div',{style:{textAlign:'right',color:C.green,fontSize:13,fontWeight:700,marginTop:6}},'R$ '+fmtNum(parseBRL(it.qtd)*parseBRL(it.unit))):null
      )),
      h('button',{onClick:addItem,style:{width:'100%',background:'transparent',border:'2px dashed '+C.border,borderRadius:12,padding:12,color:C.muted,fontWeight:700,fontSize:15,cursor:'pointer',marginBottom:14}},'+ Adicionar item'),
      h('div',{style:{background:C.accentDim,borderRadius:12,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
        h('span',{style:{fontWeight:700}},'Total'),
        h('span',{style:{color:C.green,fontWeight:900,fontSize:20}},'R$ '+fmtNum(totalItens(form.itens)))
      ),
      h(Sel,{label:'Status',value:form.status,onChange:f('status'),options:Object.entries(STATUS_ORC).map(([v,s])=>({v,l:s.label}))}),
      h(Field,{label:'Técnico Responsável',value:form.tecnico,onChange:f('tecnico'),placeholder:'Nome do técnico'}),
      h(Field,{label:'Observações',value:form.observacoes,onChange:f('observacoes'),multiline:true,placeholder:'Validade, condições...'}),
      h('div',{style:{display:'flex',gap:10,marginTop:8,paddingBottom:140,justifyContent:'flex-end'}},
        sel?h(Btn,{small:true,label:'Excluir',onClick:()=>setConf(true),color:C.red,outline:true,icon:'trash'}):null,
        h(Btn,{small:true,label:'Salvar',onClick:save,color:C.green,icon:'check'})
      )
    )
  );
};

/* ═══ LOGIN ═══ */
const LoginScreen = ({onSuccess}) => {
  const cfg = getAuthConfig();
  const isSetup = !cfg; // primeira vez: precisa criar usuario, senha e pergunta de seguranca
  const [step,setStep] = useState(isSetup?'setup':'login'); // setup | login | recover | reset
  const [user,setUser] = useState('');
  const [pass,setPass] = useState('');
  const [pass2,setPass2] = useState('');
  const [question,setQuestion] = useState('');
  const [answer,setAnswer] = useState('');
  const [recoverAnswer,setRecoverAnswer] = useState('');
  const [newPass,setNewPass] = useState('');
  const [newPass2,setNewPass2] = useState('');
  const [showPass,setShowPass] = useState(false);
  const [err,setErr] = useState('');
  const [info,setInfo] = useState('');
  const [bioBusy,setBioBusy] = useState(false);
  const bioAvailable = isWebAuthnSupported() && !!getStoredCredId();

  const handleSetup = async () => {
    if(!user.trim()){setErr('Digite um nome de usuário');return;}
    if(pass.length<4){setErr('A senha deve ter ao menos 4 caracteres');return;}
    if(pass!==pass2){setErr('As senhas não coincidem');return;}
    if(!question.trim()){setErr('Escolha uma pergunta de segurança');return;}
    if(!answer.trim()){setErr('Digite a resposta da pergunta de segurança');return;}
    setAuthConfig({user:user.trim(),pass,question:question.trim(),answer:answer.trim().toLowerCase()});
    setLoggedIn(true);
    setErr('');
    onSuccess();
  };

  const handleLogin = () => {
    if(!cfg){setErr('Configuração não encontrada');return;}
    if(user.trim()===cfg.user && pass===cfg.pass){
      setLoggedIn(true);
      onSuccess();
    } else {
      setErr('Usuário ou senha incorretos');
    }
  };

  const handleBiometric = async () => {
    setBioBusy(true); setErr('');
    const r = await verifyBiometric();
    setBioBusy(false);
    if(r.ok){ setLoggedIn(true); onSuccess(); }
    else setErr(r.msg||'Não foi possível verificar Face ID/Touch ID');
  };

  const enableBiometric = async () => {
    setBioBusy(true); setErr(''); setInfo('');
    const r = await registerBiometric(cfg?.user||user||'usuario');
    setBioBusy(false);
    if(r.ok){ setInfo('Face ID/Touch ID configurado com sucesso!'); }
    else setErr(r.msg||'Não foi possível configurar');
  };

  const handleRecoverCheck = () => {
    if(!cfg){setErr('Configuração não encontrada');return;}
    if(recoverAnswer.trim().toLowerCase()===cfg.answer){
      setErr(''); setStep('reset');
    } else {
      setErr('Resposta incorreta');
    }
  };

  const handleReset = () => {
    if(newPass.length<4){setErr('A nova senha deve ter ao menos 4 caracteres');return;}
    if(newPass!==newPass2){setErr('As senhas não coincidem');return;}
    setAuthConfig({...cfg,pass:newPass});
    setErr(''); setInfo('Senha redefinida! Faça login com a nova senha.');
    setStep('login'); setPass(''); setNewPass(''); setNewPass2(''); setRecoverAnswer('');
  };

  const QUESTIONS = [
    'Nome da sua mãe',
    'Nome do seu primeiro animal de estimação',
    'Cidade onde você nasceu',
    'Nome da sua primeira escola',
    'Seu time de futebol',
  ];

  return h('div',{style:{minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 24px'}},
    h('img',{src:LOGO_SRC,alt:'Point Tech',style:{height:96,objectFit:'contain',marginBottom:32}}),
    h('div',{style:{width:'100%',maxWidth:340}},

      step==='setup' ? h('div',null,
        h('div',{style:{textAlign:'center',marginBottom:24}},
          h('div',{style:{fontSize:19,fontWeight:800,color:C.text,marginBottom:4}},'Criar acesso'),
          h('div',{style:{fontSize:13,color:C.muted}},'Defina usuário, senha e uma pergunta de segurança')
        ),
        h(Field,{label:'Usuário',value:user,onChange:setUser,placeholder:'seu nome'}),
        h('div',{style:{marginBottom:14}},
          h('div',{style:{color:C.muted,fontSize:12,fontWeight:600,marginBottom:5,letterSpacing:0.5,textTransform:'uppercase'}},'Senha'),
          h('div',{style:{position:'relative'}},
            h('input',{type:showPass?'text':'password',value:pass,onChange:e=>setPass(e.target.value),placeholder:'••••••',style:{...inp_style,paddingRight:44}}),
            h('button',{onClick:()=>setShowPass(s=>!s),style:{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',padding:4}},h(Ic,{n:'eye',sz:18,c:C.muted}))
          )
        ),
        h('div',{style:{marginBottom:14}},
          h('div',{style:{color:C.muted,fontSize:12,fontWeight:600,marginBottom:5,letterSpacing:0.5,textTransform:'uppercase'}},'Confirmar senha'),
          h('input',{type:showPass?'text':'password',value:pass2,onChange:e=>setPass2(e.target.value),placeholder:'••••••',style:inp_style})
        ),
        h(Sel,{label:'Pergunta de segurança',value:question,onChange:setQuestion,options:[{v:'',l:'Selecione...'},...QUESTIONS.map(q=>({v:q,l:q}))]}),
        h(Field,{label:'Resposta',value:answer,onChange:setAnswer,placeholder:'Sua resposta'}),
        err?h('div',{style:{color:C.red,fontSize:13,marginTop:6,marginBottom:4,fontWeight:600}},err):null,
        h('button',{onClick:handleSetup,style:{width:'100%',background:C.accent,border:'none',borderRadius:12,padding:14,color:'#fff',fontWeight:700,fontSize:16,cursor:'pointer',marginTop:14,display:'flex',alignItems:'center',justifyContent:'center',gap:8}},
          h(Ic,{n:'lock',sz:18,c:'#fff'}),'Criar e entrar'
        )
      ):null,

      step==='login' ? h('div',null,
        h('div',{style:{textAlign:'center',marginBottom:24}},
          h('div',{style:{fontSize:19,fontWeight:800,color:C.text,marginBottom:4}},'Entrar'),
          h('div',{style:{fontSize:13,color:C.muted}},'Digite seu usuário e senha')
        ),
        h(Field,{label:'Usuário',value:user,onChange:setUser,placeholder:'seu nome'}),
        h('div',{style:{marginBottom:14}},
          h('div',{style:{color:C.muted,fontSize:12,fontWeight:600,marginBottom:5,letterSpacing:0.5,textTransform:'uppercase'}},'Senha'),
          h('div',{style:{position:'relative'}},
            h('input',{type:showPass?'text':'password',value:pass,onChange:e=>setPass(e.target.value),placeholder:'••••••',style:{...inp_style,paddingRight:44}}),
            h('button',{onClick:()=>setShowPass(s=>!s),style:{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',padding:4}},h(Ic,{n:'eye',sz:18,c:C.muted}))
          )
        ),
        info?h('div',{style:{color:C.green,fontSize:13,marginTop:6,marginBottom:4,fontWeight:600}},info):null,
        err?h('div',{style:{color:C.red,fontSize:13,marginTop:6,marginBottom:4,fontWeight:600}},err):null,
        h('button',{onClick:handleLogin,style:{width:'100%',background:C.accent,border:'none',borderRadius:12,padding:14,color:'#fff',fontWeight:700,fontSize:16,cursor:'pointer',marginTop:10,display:'flex',alignItems:'center',justifyContent:'center',gap:8}},
          h(Ic,{n:'lock',sz:18,c:'#fff'}),'Entrar'
        ),
        bioAvailable?h('button',{onClick:handleBiometric,disabled:bioBusy,style:{width:'100%',background:'transparent',border:'2px solid '+C.accent,borderRadius:12,padding:13,color:C.accent,fontWeight:700,fontSize:15,cursor:bioBusy?'wait':'pointer',marginTop:10,display:'flex',alignItems:'center',justifyContent:'center',gap:8}},
          h(Ic,{n:'eye',sz:17,c:C.accent}),bioBusy?'Verificando...':'Entrar com Face ID / Touch ID'
        ):null,
        h('div',{style:{textAlign:'center',marginTop:18}},
          h('button',{onClick:()=>{setStep('recover');setErr('');setInfo('');},style:{background:'none',border:'none',color:C.muted,fontSize:12,cursor:'pointer',textDecoration:'underline'}},'Esqueci minha senha')
        )
      ):null,

      step==='recover' ? h('div',null,
        h('div',{style:{textAlign:'center',marginBottom:24}},
          h('div',{style:{fontSize:19,fontWeight:800,color:C.text,marginBottom:4}},'Recuperar acesso'),
          h('div',{style:{fontSize:13,color:C.muted}},cfg?.question||'Responda a pergunta de segurança')
        ),
        h(Field,{label:'Resposta',value:recoverAnswer,onChange:setRecoverAnswer,placeholder:'Sua resposta'}),
        err?h('div',{style:{color:C.red,fontSize:13,marginTop:6,marginBottom:4,fontWeight:600}},err):null,
        h('button',{onClick:handleRecoverCheck,style:{width:'100%',background:C.accent,border:'none',borderRadius:12,padding:14,color:'#fff',fontWeight:700,fontSize:16,cursor:'pointer',marginTop:10}},'Verificar resposta'),
        h('div',{style:{textAlign:'center',marginTop:18}},
          h('button',{onClick:()=>{setStep('login');setErr('');},style:{background:'none',border:'none',color:C.muted,fontSize:12,cursor:'pointer',textDecoration:'underline'}},'Voltar ao login')
        )
      ):null,

      step==='reset' ? h('div',null,
        h('div',{style:{textAlign:'center',marginBottom:24}},
          h('div',{style:{fontSize:19,fontWeight:800,color:C.text,marginBottom:4}},'Nova senha'),
          h('div',{style:{fontSize:13,color:C.muted}},'Defina sua nova senha de acesso')
        ),
        h('div',{style:{marginBottom:14}},
          h('div',{style:{color:C.muted,fontSize:12,fontWeight:600,marginBottom:5,letterSpacing:0.5,textTransform:'uppercase'}},'Nova senha'),
          h('input',{type:showPass?'text':'password',value:newPass,onChange:e=>setNewPass(e.target.value),placeholder:'••••••',style:inp_style})
        ),
        h('div',{style:{marginBottom:14}},
          h('div',{style:{color:C.muted,fontSize:12,fontWeight:600,marginBottom:5,letterSpacing:0.5,textTransform:'uppercase'}},'Confirmar nova senha'),
          h('input',{type:showPass?'text':'password',value:newPass2,onChange:e=>setNewPass2(e.target.value),placeholder:'••••••',style:inp_style})
        ),
        err?h('div',{style:{color:C.red,fontSize:13,marginTop:6,marginBottom:4,fontWeight:600}},err):null,
        h('button',{onClick:handleReset,style:{width:'100%',background:C.green,border:'none',borderRadius:12,padding:14,color:'#fff',fontWeight:700,fontSize:16,cursor:'pointer',marginTop:10}},'Salvar nova senha')
      ):null,

      (step==='login' && bioAvailable===false && isWebAuthnSupported())?h('div',{style:{marginTop:22,paddingTop:18,borderTop:'1px solid '+C.border}},
        h('div',{style:{fontSize:12,color:C.muted,marginBottom:8,textAlign:'center'}},'Quer entrar com Face ID/Touch ID da próxima vez?'),
        h('button',{onClick:enableBiometric,disabled:bioBusy,style:{width:'100%',background:'transparent',border:'2px dashed '+C.accent,borderRadius:12,padding:11,color:C.accent,fontWeight:700,fontSize:13,cursor:bioBusy?'wait':'pointer'}},
          bioBusy?'Configurando...':'Ativar Face ID / Touch ID')
      ):null
    )
  );
};

/* ═══ JANELA DESKTOP ARRASTAVEL/REDIMENSIONAVEL ═══ */
const DraggableWindow = ({title,onClose,offsetIndex=0,children}) => {
  const defaultW = 640, defaultH = 720;
  const cascade = (offsetIndex%6)*32;
  const [pos,setPos] = useState({x:Math.max(20,(window.innerWidth-defaultW)/2)+cascade, y:Math.max(20,(window.innerHeight-defaultH)/2 - 40)+cascade});
  const [size,setSize] = useState({w:defaultW,h:defaultH});
  const [maximized,setMaximized] = useState(false);
  const dragRef = useRef(null);
  const resizeRef = useRef(null);

  const onDragStart = (e) => {
    if(maximized) return;
    const startX=e.clientX, startY=e.clientY, startPos={...pos};
    dragRef.current = {startX,startY,startPos};
    const onMove = (ev) => {
      const dx=ev.clientX-startX, dy=ev.clientY-startY;
      setPos({x:Math.max(0,startPos.x+dx), y:Math.max(0,startPos.y+dy)});
    };
    const onUp = () => { window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); };
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  };

  const onResizeStart = (e) => {
    e.stopPropagation();
    if(maximized) return;
    const startX=e.clientX, startY=e.clientY, startSize={...size};
    const onMove = (ev) => {
      const dx=ev.clientX-startX, dy=ev.clientY-startY;
      setSize({w:Math.max(360,startSize.w+dx), h:Math.max(300,startSize.h+dy)});
    };
    const onUp = () => { window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); };
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  };

  const winStyle = maximized
    ? {position:'fixed',top:0,left:0,width:'100vw',height:'100vh',borderRadius:0}
    : {position:'fixed',top:pos.y,left:pos.x,width:size.w,height:size.h,borderRadius:16};

  return h('div',{style:{...winStyle,background:C.bg,overflow:'hidden',boxShadow:'0 24px 70px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.08)',display:'flex',flexDirection:'column',zIndex:500}},
    h('div',{onMouseDown:onDragStart,onDoubleClick:()=>setMaximized(m=>!m),style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px',borderBottom:'1px solid '+C.border,flexShrink:0,cursor:maximized?'default':'move',userSelect:'none',background:C.surface}},
      h('span',{style:{fontWeight:800,fontSize:15,color:C.text}},title),
      h('div',{style:{display:'flex',gap:6}},
        h('button',{onClick:()=>setMaximized(m=>!m),style:{background:'transparent',border:'1px solid '+C.border,borderRadius:8,padding:'5px 10px',color:C.muted,fontWeight:700,fontSize:12,cursor:'pointer'}},maximized?'Restaurar':'Maximizar'),
        h('button',{onClick:onClose,style:{background:'transparent',border:'1px solid '+C.border,borderRadius:8,padding:'5px 10px',color:C.muted,fontWeight:700,fontSize:12,cursor:'pointer'}},'Fechar')
      )
    ),
    h('div',{style:{overflowY:'auto',flex:1}}, children),
    !maximized?h('div',{onMouseDown:onResizeStart,style:{position:'absolute',right:0,bottom:0,width:18,height:18,cursor:'nwse-resize'}},
      h('svg',{width:16,height:16,viewBox:'0 0 16 16',style:{position:'absolute',right:2,bottom:2}},
        h('path',{d:'M14 14L2 14M14 14L14 2M14 14L8 14M14 14L14 8',stroke:C.muted,strokeWidth:1.5})
      )
    ):null
  );
};

function App() {
  const [authed,setAuthed] = useState(isLoggedIn());
  const [tab,setTab] = useState('home'); // usado no mobile e como "ultima aba" no desktop
  const [data,setData] = useState(loadData);
  const [openWindows,setOpenWindows] = useState([]); // [{id, tabId}] - desktop: multiplas janelas
  const [booted,setBooted] = useState(false);

  // Ao abrir o app, sempre busca os dados mais recentes da nuvem ANTES de comecar
  // a salvar (evita sobrescrever com dados antigos). Sincronizacao 100% automatica.
  useEffect(()=>{
    (async()=>{
      const cloud = await loadCloud();
      if(cloud) setData(cloud);
      setBooted(true);
    })();
  },[]);

  useEffect(()=>{ if(booted) saveData(data); },[data,booted]);

  // Sincronizacao INSTANTANEA: escuta o stream em tempo real do Firebase.
  // Quando outro dispositivo salva, este recebe a atualizacao imediatamente,
  // sem precisar esperar nenhum intervalo de tempo.
  useEffect(()=>{
    if(!booted) return;
    const es = streamCloud((novosDados)=>{ setData(novosDados); });
    return () => { if(es) es.close(); };
  },[booted]);

  const tabs = [
    {id:'home',     label:'Painel',    icon:'home'  },
    {id:'clientes', label:'Clientes',  icon:'users' },
    {id:'produtos', label:'Produtos',  icon:'box'   },
    {id:'servicos', label:'Serviços',  icon:'clip'  },
    {id:'os',       label:'OS',        icon:'wrench'},
    {id:'orc',      label:'Orç.',      icon:'dollar'},
  ];

  const handleLogout = () => { setLoggedIn(false); setAuthed(false); };

  const [isDesktop,setIsDesktop] = useState(typeof window!=='undefined' && window.innerWidth >= 820);
  useEffect(()=>{
    const onResize = () => setIsDesktop(window.innerWidth >= 820);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  },[]);

  // Desktop: abre uma nova janela para a aba (ou foca se ja estiver aberta)
  const openDesktopWindow = (tabId) => {
    if(tabId==='home') return; // Painel nao abre em janela, fica sempre na base
    setOpenWindows(prev => prev.some(w=>w.tabId===tabId) ? prev : [...prev, {id:newId(), tabId}]);
  };
  const closeDesktopWindow = (winId) => setOpenWindows(prev => prev.filter(w=>w.id!==winId));

  const renderContentFor = (tabId, setTabFn) => h('div',null,
    tabId==='home'    ?h(Dashboard, {data,setTab:setTabFn,setData,onLogout:handleLogout}):null,
    tabId==='os'      ?h(Ordens,    {data,setData,onNovoCliente:()=>setTabFn('clientes')}):null,
    tabId==='orc'     ?h(Orcamentos,{data,setData,onNovoCliente:()=>setTabFn('clientes')}):null,
    tabId==='clientes'?h(Clientes,  {data,setData}):null,
    tabId==='produtos'?h(Produtos,  {data,setData}):null,
    tabId==='servicos'?h(Servicos,  {data,setData}):null,
  );

  if(!authed){
    return h(LoginScreen,{onSuccess:()=>setAuthed(true)});
  }

  if(!isDesktop){
    // ── LAYOUT MOBILE (inalterado) ──
    return h('div',{style:{background:C.bg,minHeight:'100vh',width:'100%',fontFamily:"-apple-system,'Inter',sans-serif",color:C.text,position:'relative'}},
      h('div',{style:{paddingBottom:72}}, renderContentFor(tab,setTab)),
      h('div',{style:{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:430,background:C.surface,borderTop:'1px solid '+C.border,display:'flex',justifyContent:'space-evenly',alignItems:'center',zIndex:100,paddingBottom:'env(safe-area-inset-bottom)',paddingTop:6,paddingLeft:4,paddingRight:4}},
        tabs.map(t=>h('button',{key:t.id,onClick:()=>setTab(t.id),style:{flex:'1 1 0',maxWidth:80,background:'none',border:'none',cursor:'pointer',padding:'4px 2px 8px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,color:tab===t.id?C.accent:C.muted,minWidth:0}},
          h(Ic,{n:t.icon,sz:21,c:tab===t.id?C.accent:C.muted}),
          h('span',{style:{fontSize:9,fontWeight:700,letterSpacing:0.2,whiteSpace:'nowrap'}},t.label)
        ))
      )
    );
  }

  // ── LAYOUT DESKTOP: Painel sempre em tela cheia; multiplas janelas arrastaveis simultaneas ──
  return h('div',{style:{minHeight:'100vh',width:'100%',background:C.bg,fontFamily:"-apple-system,'Inter',sans-serif",color:C.text,display:'flex'}},
    h('div',{style:{width:84,flexShrink:0,background:C.surface,borderRight:'1px solid '+C.border,display:'flex',flexDirection:'column',alignItems:'center',paddingTop:20,gap:6,position:'sticky',top:0,height:'100vh'}},
      h('img',{src:LOGO_SRC,alt:'PT',style:{height:34,objectFit:'contain',marginBottom:18}}),
      tabs.map(t=>h('button',{key:t.id,onClick:()=>t.id==='home'?setTab('home'):openDesktopWindow(t.id),style:{width:64,background:(t.id==='home'&&openWindows.length===0)?C.accentDim:(openWindows.some(w=>w.tabId===t.id)?C.accentDim:'transparent'),border:'none',borderRadius:12,padding:'10px 4px',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:5,color:openWindows.some(w=>w.tabId===t.id)?C.accent:C.muted}},
        h(Ic,{n:t.icon,sz:21,c:openWindows.some(w=>w.tabId===t.id)?C.accent:C.muted}),
        h('span',{style:{fontSize:10,fontWeight:700,letterSpacing:0.2,whiteSpace:'nowrap'}},t.label)
      ))
    ),
    h('div',{style:{flex:1,minWidth:0}},
      h('div',{style:{maxWidth:900,margin:'0 auto',width:'100%'}},
        h(Dashboard,{data,setTab:openDesktopWindow,setData,onLogout:handleLogout})
      )
    ),
    ...openWindows.map((w,idx)=>{
      const lbl = (tabs.find(t=>t.id===w.tabId)||{}).label||'';
      return h(DraggableWindow,{key:w.id,title:lbl,onClose:()=>closeDesktopWindow(w.id),offsetIndex:idx}, renderContentFor(w.tabId, openDesktopWindow));
    })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));

  </script>
</body>
