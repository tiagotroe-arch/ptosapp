const KEY   = 'os_app_v5';
const EMPTY = {clientes:[],ordens:[],orcamentos:[],produtos:[],servicos:[]};
const loadLocal = () => { try{const s=localStorage.getItem(KEY); return s?{...EMPTY,...JSON.parse(s)}:null;}catch{return null;} };

// Codigo de sincronizacao escolhido pelo usuario (ex: nome da empresa).
// O MESMO codigo em qualquer dispositivo acessa os MESMOS dados na nuvem.
// Usamos kvdb.io: bucket fixo da Point Tech + chave = codigo de sincronizacao escolhido.
const SYNC_BUCKET = 'pointtech_os_app_bucket01';
const SYNC_CODE_KEY = 'os_synccode_v1';
const getSyncCode = () => { try{return window._syncCode||localStorage.getItem(SYNC_CODE_KEY)||'';}catch{return '';} };
const setSyncCode = (c) => { window._syncCode=c; try{localStorage.setItem(SYNC_CODE_KEY,c);}catch{} };

window._syncStatus = { ok:null, msg:'' };

const kvUrl = (code) => 'https://kvdb.io/'+SYNC_BUCKET+'/'+encodeURIComponent(code.trim());

const loadCloud = async (code) => {
  if(!code){ window._syncStatus={ok:false,msg:'Defina um codigo de sincronizacao'}; return null; }
  try{
    const r = await fetch(kvUrl(code));
    if(r.status===404){ window._syncStatus={ok:false,msg:'Nenhum dado salvo ainda com este codigo. Use "Enviar agora" para criar.'}; return null; }
    if(!r.ok){ const t=await r.text().catch(()=>''); window._syncStatus={ok:false,msg:'Erro '+r.status+' ao buscar: '+t.slice(0,150)}; return null; }
    const txt = await r.text();
    const d = JSON.parse(txt);
    window._syncStatus={ok:true,msg:'Dados carregados da nuvem!'};
    return {...EMPTY,...d};
  }catch(e){ window._syncStatus={ok:false,msg:'Erro de rede: '+e.message}; return null; }
};

const saveCloud = async (data) => {
  const code = getSyncCode();
  if(!code){ window._syncStatus={ok:false,msg:'Defina um codigo de sincronizacao'}; return; }
  try{
    const r = await fetch(kvUrl(code), {method:'PUT', body: JSON.stringify(data)});
    if(!r.ok){ const t=await r.text().catch(()=>''); window._syncStatus={ok:false,msg:'Erro '+r.status+' ao salvar: '+t.slice(0,150)}; return; }
    window._syncStatus={ok:true,msg:'Dados salvos na nuvem!'};
  }catch(e){ window._syncStatus={ok:false,msg:'Erro de rede: '+e.message}; }
};

const loadData = () => loadLocal()||EMPTY;
const saveData = (d) => { saveLocal(d); if(getSyncCode()) saveCloud(d); };

const buscarCnpj = async (cnpj, onFound, setMsg) => {
  const digits = cnpj.replace(/\D/g,'');
  if(digits.length!==14){ setMsg({t:'CNPJ deve ter 14 digitos',ok:false}); return; }
  setMsg({t:'Buscando dados do CNPJ...',ok:null});
  try{
    const r = await fetch('https://brasilapi.com.br/api/cnpj/v1/'+digits);
    if(!r.ok){ setMsg({t:'CNPJ nao encontrado',ok:false}); return; }
    const d = await r.json();
    onFound({
      nome: d.razao_social || d.nome_fantasia || '',
      telefone: d.ddd_telefone_1 ? d.ddd_telefone_1 : '',
      celular: d.ddd_telefone_2 ? d.ddd_telefone_2 : '',
      email: d.email || '',
      cep: d.cep || '',
      logradouro: (d.descricao_tipo_de_logradouro?d.descricao_tipo_de_logradouro+' ':'')+(d.logradouro||''),
      numero: d.numero || '',
      complemento: d.complemento || '',
      bairro: d.bairro || '',
      cidade: d.municipio || '',
      estado: d.uf || '',
    });
    setMsg({t:'Dados da empresa preenchidos!',ok:true});
  }catch(e){ setMsg({t:'Erro ao buscar CNPJ. Preencha manualmente.',ok:false}); }
};

const buscarCep = (cep, onFound, setMsg) => {
  const digits = cep.replace(/\D/g,'');
  if(digits.length!==8){setMsg({t:'CEP deve ter 8 digitos',ok:false});return;}
  setMsg({t:'Buscando...',ok:null});
  const cbName = '_vc_'+Date.now();
  const tid = setTimeout(()=>{
    try{delete window[cbName];}catch{}
    const s=document.getElementById(cbName); if(s)s.remove();
    // fallback local
    const p5=digits.slice(0,5),p4=digits.slice(0,4),p3=digits.slice(0,3);
    const m=PR_CEPS[p5]||PR_CEPS[p4]||PR_CEPS[p3];
    if(m){onFound({logradouro:'',bairro:m[0],localidade:m[1],uf:'PR'});setMsg({t:'Cidade e bairro preenchidos!',ok:true});}
    else setMsg({t:'CEP nao encontrado. Preencha manualmente.',ok:false});
  },5000);
  window[cbName]=(d)=>{
    clearTimeout(tid); try{delete window[cbName];}catch{}
    const s=document.getElementById(cbName); if(s)s.remove();
    if(d&&!d.erro){onFound({logradouro:d.logradouro||'',bairro:d.bairro||'',localidade:d.localidade||'',uf:d.uf||'PR'});setMsg({t:d.logradouro?'Endereço completo!':'Cidade e bairro preenchidos!',ok:true});}
    else{
      const p5=digits.slice(0,5),p4=digits.slice(0,4),p3=digits.slice(0,3);
      const m=PR_CEPS[p5]||PR_CEPS[p4]||PR_CEPS[p3];
      if(m){onFound({logradouro:'',bairro:m[0],localidade:m[1],uf:'PR'});setMsg({t:'Cidade e bairro preenchidos!',ok:true});}
      else setMsg({t:'CEP nao encontrado.',ok:false});
    }
  };
  const sc=document.createElement('script'); sc.id=cbName;
  sc.src='https://viacep.com.br/ws/'+digits+'/json/?callback='+cbName;
  sc.onerror=()=>{clearTimeout(tid);try{delete window[cbName];}catch{};sc.remove();setMsg({t:'Servico indisponivel.',ok:false});};
  document.head.appendChild(sc);
};

const textoWA = (tipo,numero,status,cliNome,descricao,valor,itens,obs) => {
  let t='*Point Tech - '+tipo+'*\n━━━━━━━━━━━━━━━━━━━━\n';
  t+='No: '+numero+'\nCliente: '+cliNome+'\nStatus: '+status+'\n';
  if(descricao) t+='Servico: '+descricao+'\n';
  if(itens&&itens.length){t+='\nItens:\n';itens.forEach(i=>{const s=parseBRL(i.qtd||'0')*parseBRL(i.unit||'0');t+='  * '+i.desc+' ('+i.qtd+'x R$ '+fmtNum(parseBRL(i.unit||'0'))+') = R$ '+fmtNum(s)+'\n';});}
  if(valor) t+='\nTotal: R$ '+fmtNum(parseBRL(valor))+'\n';
  if(obs) t+='\nObs: '+obs+'\n';
  t+='━━━━━━━━━━━━━━━━━━━━\nPoint Tech Informatica - CNPJ 45.686.684/0001-65';
  return t;
};

const PressCard = ({children,style:cs={},onTap,onLong}) => {
  const timer=useRef(null),fired=useRef(false),startY=useRef(0);
  const onTS=(e)=>{fired.current=false;startY.current=e.touches[0].clientY;timer.current=setTimeout(()=>{fired.current=true;onLong&&onLong();},600);};
  const onTE=(e)=>{clearTimeout(timer.current);const dy=Math.abs(e.changedTouches[0].clientY-startY.current);if(!fired.current&&dy<8)onTap&&onTap();};
  const onTM=(e)=>{if(Math.abs(e.touches[0].clientY-startY.current)>8)clearTimeout(timer.current);};
  return h('div',{onTouchStart:onTS,onTouchEnd:onTE,onTouchMove:onTM,onClick:onTap,
    style:{background:C.card,borderRadius:14,padding:'14px 16px',border:'1px solid '+C.border,marginBottom:10,cursor:'pointer',userSelect:'none',WebkitUserSelect:'none',...cs}},children);
};

const SyncModal = ({onClose,setData,data}) => {
  const [code,setCode] = useState(getSyncCode());
  const [status,setStatus] = useState(null); // {ok, msg}
  const [loading,setLoading] = useState(false);

  const enviarAgora = async () => {
    if(!code.trim()){setStatus({ok:false,msg:'Digite um codigo de sincronizacao'});return;}
    setSyncCode(code.trim());
    setLoading(true); setStatus({ok:null,msg:'Enviando dados...'});
    await saveCloud(data||EMPTY);
    setLoading(false);
    setStatus(window._syncStatus||{ok:false,msg:'Sem resposta'});
  };

  const buscarAgora = async () => {
    if(!code.trim()){setStatus({ok:false,msg:'Digite um codigo de sincronizacao'});return;}
    setSyncCode(code.trim());
    setLoading(true); setStatus({ok:null,msg:'Buscando dados da nuvem...'});
    const d=await loadCloud(code.trim());
    setLoading(false);
    if(d){ setData(d); saveLocal(d); setStatus({ok:true,msg:'Dados sincronizados com sucesso!'}); }
    else setStatus(window._syncStatus||{ok:false,msg:'Nenhum dado encontrado'});

  const f=k=>v=>setForm(p=>({...p,[k]:v}));
  const openNew=()=>{setForm(BLANK_C);setSel(null);setView('form');};
  const openEdit=c=>{setForm({...BLANK_C,...c});setSel(c);setView('form');};
  const handleCep=d=>setForm(p=>({...p,logradouro:d.logradouro||'',bairro:d.bairro||'',cidade:d.localidade||'',estado:d.uf||''}));
  const save=()=>{if(!form.nome.trim())return;setData(p=>{const clientes=sel?p.clientes.map(c=>c.id===sel.id?{...form,id:sel.id}:c):[...p.clientes,{...form,id:newId()}];return{...p,clientes};});setView('list');};
  const del=()=>{setData(p=>({...p,clientes:p.clientes.filter(c=>c.id!==sel.id)}));setConf(false);setView('list');};

  if(view==='list') return h('div',null,
    h(TopBar,{title:'Clientes',action:h(Btn,{small:true,label:'Novo',onClick:openNew,icon:'plus'})}),
    h('div',{style:{padding:'12px 16px'}},
      data.clientes.length===0?h(Empty,{msg:'Nenhum cliente cadastrado'}):
      data.clientes.map(c=>h(Card,{key:c.id,onClick:()=>{setSel(c);setView('detail');}},
        h('div',{style:{display:'flex',justifyContent:'space-between'}},
          h('div',null,
            h('div',{style:{fontWeight:700,fontSize:16,color:C.text,marginBottom:3}},c.nome),
            c.telefone?h('div',{style:{color:C.muted,fontSize:13}},c.telefone):null,
            (c.cidade||c.estado)?h('div',{style:{color:C.muted,fontSize:12,marginTop:2}},[c.cidade,c.estado].filter(Boolean).join(' — ')):null
          ),
          h('div',{style:{color:C.accent,fontSize:12,fontWeight:700}},data.ordens.filter(o=>o.clienteId===c.id).length+' OS')
        )
      ))
    )
  );

  if(view==='detail'){
    const c=sel;
    const end=[c.logradouro,c.numero,c.complemento].filter(Boolean).join(', ');
    const end2=[c.bairro,c.cidade,c.estado].filter(Boolean).join(', ');
    return h('div',null,
      h(TopBar,{title:'Cliente',onBack:()=>setView('list'),action:h(Btn,{small:true,outline:true,label:'Editar',onClick:()=>openEdit(c),icon:'edit'})}),
      h('div',{style:{padding:'14px 16px'}},
        h('div',{style:{fontSize:21,fontWeight:800,color:C.text,marginBottom:10}},c.nome),
        c.cpfcnpj?h('div',{style:{color:C.muted,fontSize:13,marginBottom:4}},'Doc: '+c.cpfcnpj):null,
        c.telefone?h('div',{style:{display:'flex',gap:8,alignItems:'center',color:C.muted,marginBottom:4}},h(Ic,{n:'phone',sz:14,c:C.muted}),c.telefone):null,
        c.celular?h('a',{href:'https://wa.me/55'+c.celular.replace(/\\D/g,''),target:'_blank',style:{display:'flex',gap:8,alignItems:'center',color:'#25D366',marginBottom:4,textDecoration:'none',fontWeight:600}},h(Ic,{n:'wa',sz:14,c:'#25D366'}),c.celular):null,
        c.email?h('div',{style:{display:'flex',gap:8,alignItems:'center',color:C.muted,marginBottom:4}},h(Ic,{n:'mail',sz:14,c:C.muted}),c.email):null,
        (end||end2)?h('div',{style:{display:'flex',gap:8,color:C.muted,fontSize:13,marginBottom:4}},h(Ic,{n:'pin',sz:14,c:C.muted}),[end,end2].filter(Boolean).join(' — ')+(c.cep?' — '+c.cep:'')):null,
        h(Divider),
        h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,marginBottom:8}},'OS ('+data.ordens.filter(o=>o.clienteId===c.id).length+')'),
        ...data.ordens.filter(o=>o.clienteId===c.id).map(o=>
          h(Card,{key:o.id,style:{padding:'10px 14px'}},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
              h('span',{style:{fontWeight:700,color:C.accent,fontSize:13}},o.numero),
              h(Badge,{...STATUS_OS[o.status]})
            ),
            h('div',{style:{fontSize:14,color:C.text,marginTop:3}},o.descricao)
          )
        )
      )
    );
  }

  return h('div',null,
    conf?h(ConfirmModal,{msg:'Excluir "'+sel?.nome+'"?',onOk:del,onCancel:()=>setConf(false)}):null,
    h(TopBar,{title:sel?'Editar Cliente':'Novo Cliente',onBack:()=>setView('list')}),
    h('div',{style:{padding:'14px 16px'}},
      h(Field,{label:'Nome *',value:form.nome,onChange:f('nome'),placeholder:'Nome completo'}),
      h(MaskedField,{label:'Telefone',value:form.telefone,onChange:f('telefone'),mask:maskPhone,placeholder:'(11) 3333-4444',inputMode:'numeric',maxLen:16}),
      h(MaskedField,{label:'Celular (WhatsApp)',value:form.celular,onChange:f('celular'),mask:maskPhone,placeholder:'(11) 99999-9999',inputMode:'numeric',maxLen:16}),
      h(Field,{label:'E-mail',value:form.email,onChange:f('email'),placeholder:'email@exemplo.com',type:'email'}),
      h(DocField,{value:form.cpfcnpj,onChange:f('cpfcnpj'),onFoundCnpj:(d)=>setForm(p=>({
        ...p,
        nome: d.nome||p.nome,
        telefone: d.telefone?maskPhone(d.telefone):p.telefone,
        celular: d.celular?maskPhone(d.celular):p.celular,
        email: d.email||p.email,
        cep: d.cep?maskCep(d.cep):p.cep,
        logradouro: d.logradouro||p.logradouro,
        numero: d.numero||p.numero,
        complemento: d.complemento||p.complemento,
        bairro: d.bairro||p.bairro,
        cidade: d.cidade||p.cidade,
        estado: d.estado||p.estado,
      }))}),
      h(Divider),
      h(CepField,{cep:form.cep,onChange:f('cep'),onFound:handleCep}),
      h(Field,{label:'Logradouro',value:form.logradouro,onChange:f('logradouro'),placeholder:'Rua, Av...'}),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
        h(Field,{label:'Número',value:form.numero,onChange:f('numero'),placeholder:'123'}),
        h(Field,{label:'Complemento',value:form.complemento,onChange:f('complemento'),placeholder:'Apto...'})
      ),
      h(Field,{label:'Bairro',value:form.bairro,onChange:f('bairro'),placeholder:'Bairro'}),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 72px',gap:10}},
        h(Field,{label:'Cidade',value:form.cidade,onChange:f('cidade'),placeholder:'Cidade'}),
        h(Field,{label:'UF',value:form.estado,onChange:f('estado'),placeholder:'PR'})
      ),
      h('div',{style:{display:'flex',gap:10,marginTop:8,paddingBottom:140,justifyContent:'flex-end'}},
        sel?h(Btn,{small:true,label:'Excluir',onClick:()=>setConf(true),color:C.red,outline:true,icon:'trash'}):null,
        h(Btn,{small:true,label:'Cancelar',onClick:()=>setView('list'),color:C.muted,outline:true}),
        h(Btn,{small:true,label:'Salvar',onClick:save,color:C.green,icon:'check',disabled:!form.nome.trim()})
      )
    )
  );
};

/* ═══ ORDENS ═══ */
const BLANK_OS={clienteId:'',descricao:'',valor:'',status:'aberta',observacoes:''};
const Ordens = ({data,setData,onNovoCliente}) => {
  const [view,setView]=useState('list');const [sel,setSel]=useState(null);const [form,setForm]=useState(BLANK_OS);
  const [conf,setConf]=useState(false);const [stMod,setStMod]=useState(null);const [doc,setDoc]=useState(null);
  const f=k=>v=>setForm(p=>({...p,[k]:v}));
  const cliNome=id=>data.clientes.find(c=>c.id===id)?.nome||'—';
  const nextNum=()=>'OS-'+String(1250+data.ordens.length);
  const openNew=()=>{setForm({...BLANK_OS,clienteId:''});setSel(null);setView('form');};
  const openEdit=o=>{setForm({...BLANK_OS,...o});setSel(o);setView('form');};
  const save=()=>{
    if(!form.descricao.trim()||!form.clienteId)return;
    setData(p=>{const ordens=sel?p.ordens.map(o=>o.id===sel.id?{...form,id:sel.id,numero:sel.numero,data:sel.data}:o):[...p.ordens,{...form,id:newId(),numero:nextNum(),data:today()}];return{...p,ordens};});
    setView('list');
  };
  const del=()=>{setData(p=>({...p,ordens:p.ordens.filter(o=>o.id!==sel.id)}));setConf(false);setView('list');};
  const changeStatus=(id,status)=>{setData(p=>({...p,ordens:p.ordens.map(o=>o.id===id?{...o,status}:o)}));setSel(p=>p?.id===id?{...p,status}:p);setStMod(null);};
  const abrirDoc=(o)=>{
    const cli=data.clientes.find(c=>c.id===o.clienteId);
    const servList=[{desc:o.descricao,qtd:'1',unit:o.valor||'0'}];
    const html=buildPdf('Ordem de Serviço',o.numero,STATUS_OS[o.status]?.label,cli,[],servList,o.descricao,parseBRL(o.valor),o.observacoes,o.data);
    const waText=textoWA('OS',o.numero,STATUS_OS[o.status]?.label,cli?.nome||'—',o.descricao,o.valor,null,o.observacoes);
    setDoc({html,numero:o.numero,tel:cli?.telefone||'',waText});
  };

  if(view==='list') return h('div',null,
    doc?h(DocModal,{doc,onClose:()=>setDoc(null)}):null,
    stMod?h(StatusModal,{title:'Status da OS',current:data.ordens.find(o=>o.id===stMod)?.status,statuses:STATUS_OS,onSelect:s=>changeStatus(stMod,s),onClose:()=>setStMod(null)}):null,
    h(TopBar,{title:'Ordens de Serviço',action:h(Btn,{small:true,label:'Nova OS',onClick:openNew,icon:'plus'})}),
    h('div',{style:{padding:'12px 16px'}},
      data.ordens.length===0?h(Empty,{msg:'Nenhuma OS'}):
      h('div',null,
        h('div',{style:{textAlign:'center',color:C.muted,fontSize:11,paddingBottom:8}},'Toque para abrir · Segure para mudar status'),
        ...data.ordens.map(o=>h(PressCard,{key:o.id,onTap:()=>{setSel({...o});setView('detail');},onLong:()=>setStMod(o.id)},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}},
            h('span',{style:{fontWeight:800,color:C.accent,fontSize:14}},o.numero),
            h(Badge,{...STATUS_OS[o.status]})
          ),
          h('div',{style:{fontWeight:600,color:C.text,fontSize:15,marginBottom:4}},o.descricao),
          h('div',{style:{display:'flex',justifyContent:'space-between'}},
            h('span',{style:{color:C.muted,fontSize:13}},cliNome(o.clienteId)),
            h('span',{style:{fontWeight:800,color:C.green}},'R$ '+fmtNum(parseBRL(o.valor)))
          )
        ))
      )
    )
  );

  if(view==='detail'){
    const o=sel; const cur=data.ordens.find(x=>x.id===o.id)||o;
    const cli=data.clientes.find(c=>c.id===o.clienteId);
    const waNum=(cli&&(cli.celular||cli.telefone))?(cli.celular||cli.telefone).replace(/\D/g,''):'';
    const enviarPdfWA=()=>{
      const servList=[{desc:cur.descricao,qtd:'1',unit:cur.valor||'0'}];
      const htmlDoc=buildPdf('Ordem de Serviço',cur.numero,STATUS_OS[cur.status]?.label,cli,[],servList,cur.descricao,parseBRL(cur.valor),cur.observacoes,cur.data);
      const blob=new Blob([htmlDoc],{type:'text/html'});
      const file=new File([blob],'PointTech_'+cur.numero+'.html',{type:'text/html'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:'Point Tech - '+cur.numero,text:'Ordem de Servico '+cur.numero}).catch(()=>{});
      } else {
        // Fallback: abre o documento para o usuario compartilhar manualmente de la
        const url=URL.createObjectURL(blob);
        const w=window.open(url,'_blank');
        if(!w) window.location.href=url;
      }
    };
    return h('div',null,
      doc?h(DocModal,{doc,onClose:()=>setDoc(null)}):null,
      stMod?h(StatusModal,{title:'Status da OS',current:cur.status,statuses:STATUS_OS,onSelect:s=>changeStatus(o.id,s),onClose:()=>setStMod(null)}):null,
      h(TopBar,{title:o.numero,onBack:()=>{setView('list');setSel(null);},
        action:h('div',{style:{display:'flex',gap:6}},
          h(Btn,{small:true,outline:true,label:'PDF',onClick:()=>abrirDoc(cur),icon:'wa',color:'#25D366'}),
          h(Btn,{small:true,outline:true,label:'Editar',onClick:()=>openEdit(cur),icon:'edit'})
        )
      }),
      h('div',{style:{padding:'14px 16px'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:14}},
          h(Badge,{...STATUS_OS[cur.status]}),
          h('button',{onClick:()=>setStMod(o.id),style:{background:C.accentDim,border:'1px solid '+C.accent,borderRadius:8,padding:'6px 14px',color:C.accent,fontSize:14,fontWeight:700,cursor:'pointer'}},'Trocar status')
        ),
        h('div',{style:{fontSize:19,fontWeight:800,color:C.text,marginBottom:4}},cur.descricao),
        h('div',{style:{color:C.muted,fontSize:13,marginBottom:16}},cur.data),
        h(Card,{style:{padding:'12px 16px'}},h('div',{style:{display:'flex',justifyContent:'space-between'}},h('span',{style:{color:C.muted,fontSize:13}},'Cliente'),h('span',{style:{fontWeight:700}},cliNome(o.clienteId)))),
        h(Card,{style:{padding:'12px 16px'}},h('div',{style:{display:'flex',justifyContent:'space-between'}},h('span',{style:{color:C.muted,fontSize:13}},'Valor'),h('span',{style:{fontWeight:800,color:C.green,fontSize:18}},'R$ '+fmtNum(parseBRL(cur.valor))))),
        cur.observacoes?h('div',null,h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,margin:'14px 0 8px'}},'OBSERVAÇÕES'),h(Card,null,h('div',{style:{color:C.text,fontSize:14,lineHeight:1.6}},cur.observacoes))):null,
        waNum?h('button',{onClick:enviarPdfWA,style:{width:'100%',marginTop:18,background:'#25D366',border:'none',borderRadius:14,padding:15,color:'#fff',fontWeight:800,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10}},h(Ic,{n:'wa',sz:20,c:'#fff'}),' Enviar PDF pelo WhatsApp'):null
      )
    );
  }

  return h('div',null,
    conf?h(ConfirmModal,{msg:'Excluir "'+sel?.numero+'"?',onOk:del,onCancel:()=>setConf(false)}):null,
    h(TopBar,{title:sel?'Editar OS':'Nova OS',onBack:()=>setView('list')}),
    h('div',{style:{padding:'14px 16px'}},
      h('div',{style:{marginBottom:14}},
        h('div',{style:{color:C.muted,fontSize:12,fontWeight:600,marginBottom:8,letterSpacing:0.5,textTransform:'uppercase'}},'Cliente'),
        data.clientes.length===0
          ?h('div',{style:{color:C.yellow,fontSize:14,padding:'10px 14px',background:C.yellow+'15',borderRadius:10,marginBottom:8}},'Nenhum cliente cadastrado.')
          :h('select',{value:form.clienteId,onChange:e=>f('clienteId')(e.target.value),style:{...inp_style,appearance:'none',WebkitAppearance:'none',marginBottom:8,color:form.clienteId?C.text:C.muted}},
              h('option',{value:''},'Selecione um cliente...'),
              data.clientes.map(c=>h('option',{key:c.id,value:c.id},c.nome+(c.telefone?' — '+c.telefone:'')))
            ),
        h('button',{onClick:onNovoCliente,style:{width:'100%',background:'transparent',border:'2px dashed '+C.accent,borderRadius:10,padding:10,color:C.accent,fontWeight:700,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}},
          h(Ic,{n:'plus',sz:16,c:C.accent}),' Cadastrar novo cliente'
        )
      ),
      h(Field,{label:'Descricao *',value:form.descricao,onChange:f('descricao'),placeholder:'Ex: Troca de tela iPhone 13'}),
      h(ValorField,{label:'Valor',value:form.valor,onChange:f('valor')}),
      h(Sel,{label:'Status',value:form.status,onChange:f('status'),options:Object.entries(STATUS_OS).map(([v,s])=>({v,l:s.label}))}),
      h(Field,{label:'Observações',value:form.observacoes,onChange:f('observacoes'),multiline:true,placeholder:'Informações adicionais...'}),
      h('div',{style:{display:'flex',gap:10,marginTop:8,paddingBottom:140,justifyContent:'flex-end'}},
        sel?h(Btn,{small:true,label:'Excluir',onClick:()=>setConf(true),color:C.red,outline:true,icon:'trash'}):null,
        h(Btn,{small:true,label:'Salvar',onClick:save,color:C.green,icon:'check',disabled:!form.descricao.trim()||!form.clienteId})
      )
    )
  );
};

/* ═══ ORÇAMENTOS ═══ */
const BLANK_ORC={clienteId:'',itens:[{desc:'',qtd:'1',unit:''}],status:'pendente',observacoes:''};
const Orcamentos = ({data,setData,onNovoCliente}) => {
  const [view,setView]=useState('list');const [sel,setSel]=useState(null);const [form,setForm]=useState(BLANK_ORC);
  const [conf,setConf]=useState(false);const [stMod,setStMod]=useState(null);const [doc,setDoc]=useState(null);
  const f=k=>v=>setForm(p=>({...p,[k]:v}));
  const cliNome=id=>data.clientes.find(c=>c.id===id)?.nome||'—';
  const nextNum=()=>'ORC-'+String(data.orcamentos.length+1).padStart(3,'0');
  const totalItens=itens=>itens.reduce((s,i)=>s+parseBRL(i.qtd||'0')*parseBRL(i.unit||'0'),0);
  const openNew=()=>{setForm({...BLANK_ORC,clienteId:'',itens:[{desc:'',qtd:'1',unit:''}]});setSel(null);setView('form');};
  const openEdit=o=>{setForm({...BLANK_ORC,...o,itens:o.itens.map(i=>({...i}))});setSel(o);setView('form');};
  const addItem=()=>setForm(p=>({...p,itens:[...p.itens,{desc:'',qtd:'1',unit:''}]}));
  const remItem=i=>setForm(p=>({...p,itens:p.itens.filter((_,idx)=>idx!==i)}));
  const upItem=(i,k,v)=>setForm(p=>({...p,itens:p.itens.map((it,idx)=>idx===i?{...it,[k]:v}:it)}));

  if(view==='list') return h('div',null,
    doc?h(DocModal,{doc,onClose:()=>setDoc(null)}):null,
    stMod?h(StatusModal,{title:'Status do Orcamento',current:data.orcamentos.find(o=>o.id===stMod)?.status,statuses:STATUS_ORC,onSelect:s=>changeStatus(stMod,s),onClose:()=>setStMod(null)}):null,
    h(TopBar,{title:'Orçamentos',action:h(Btn,{small:true,label:'Novo',onClick:openNew,icon:'plus'})}),
    h('div',{style:{padding:'12px 16px'}},
      data.orcamentos.length===0?h(Empty,{msg:'Nenhum orcamento'}):
      h('div',null,
        h('div',{style:{textAlign:'center',color:C.muted,fontSize:11,paddingBottom:8}},'Toque para abrir · Segure para mudar status'),
        ...data.orcamentos.map(o=>h(PressCard,{key:o.id,onTap:()=>{setSel({...o});setView('detail');},onLong:()=>setStMod(o.id)},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}},
            h('span',{style:{fontWeight:800,color:C.accent,fontSize:14}},o.numero),
            h(Badge,{...STATUS_ORC[o.status]})

          h('div',{style:{display:'flex',justifyContent:'space-between'}},
            h('span',{style:{color:C.muted,fontSize:13}},cliNome(o.clienteId)),
            h('span',{style:{fontWeight:800,color:C.green}},'R$ '+fmtNum(totalItens(o.itens)))
          )
        ))
      )
    )

  if(view==='detail'){
    const o=sel; const cur=data.orcamentos.find(x=>x.id===o.id)||o;
    const cli=data.clientes.find(c=>c.id===o.clienteId);
    const waNum=(cli&&(cli.celular||cli.telefone))?(cli.celular||cli.telefone).replace(/\D/g,''):'';
    const enviarPdfWA=()=>{
      const t=totalItens(cur.itens);
      const htmlDoc=buildPdf('Orçamento',cur.numero,STATUS_ORC[cur.status]?.label,cli,cur.itens,[],null,t,cur.observacoes,cur.data);

      if(navigator.canShare && navigator.canShare({files:[file]})){

        const w=window.open(url,'_blank');

    return h('div',null,
      doc?h(DocModal,{doc,onClose:()=>setDoc(null)}):null,
      stMod?h(StatusModal,{title:'Status do Orcamento',current:cur.status,statuses:STATUS_ORC,onSelect:s=>changeStatus(o.id,s),onClose:()=>setStMod(null)}):null,
      h(TopBar,{title:o.numero,onBack:()=>{setView('list');setSel(null);},
        action:h('div',{style:{display:'flex',gap:6}},
          h(Btn,{small:true,outline:true,label:'PDF',onClick:()=>abrirDoc(cur),icon:'wa',color:'#25D366'}),
          h(Btn,{small:true,outline:true,label:'Editar',onClick:()=>openEdit(cur),icon:'edit'})
        )
      }),
      h('div',{style:{padding:'14px 16px'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:10}},
          h(Badge,{...STATUS_ORC[cur.status]}),
          h('button',{onClick:()=>setStMod(o.id),style:{background:C.accentDim,border:'1px solid '+C.accent,borderRadius:8,padding:'6px 14px',color:C.accent,fontSize:14,fontWeight:700,cursor:'pointer'}},'Trocar status')
        ),
        h('div',{style:{color:C.muted,fontSize:13,marginBottom:10}},'Data: '+o.data+' - '+cliNome(o.clienteId)),
        ...cur.itens.map((it,i)=>h(Card,{key:i,style:{padding:'10px 14px'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
            h('div',null,h('div',{style:{fontWeight:600,color:C.text,fontSize:14}},it.desc),h('div',{style:{color:C.muted,fontSize:12,marginTop:2}},it.qtd+'x R$ '+fmtNum(parseBRL(it.unit||'0')))),
            h('span',{style:{fontWeight:700,color:C.green}},'R$ '+fmtNum(parseBRL(it.qtd||'0')*parseBRL(it.unit||'0')))
          )
        )),
        h('div',{style:{background:C.accentDim,borderRadius:12,padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}},
          h('span',{style:{fontWeight:700}},'Total'),
          h('span',{style:{color:C.green,fontWeight:900,fontSize:22}},'R$ '+fmtNum(totalItens(cur.itens)))
        ),
        cur.observacoes?h('div',null,h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,margin:'14px 0 8px'}},'OBSERVAÇÕES'),h(Card,null,h('div',{style:{color:C.text,fontSize:14,lineHeight:1.6}},cur.observacoes))):null,
        waNum?h('button',{onClick:enviarPdfWA,style:{width:'100%',marginTop:18,background:'#25D366',border:'none',borderRadius:14,padding:15,color:'#fff',fontWeight:800,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10}},h(Ic,{n:'wa',sz:20,c:'#fff'}),' Enviar PDF pelo WhatsApp'):null
      )
    );
  }

  return h('div',null,
    conf?h(ConfirmModal,{msg:'Excluir "'+sel?.numero+'"?',onOk:del,onCancel:()=>setConf(false)}):null,
    h(TopBar,{title:sel?'Editar Orçamento':'Novo Orçamento',onBack:()=>setView('list')}),
    h('div',{style:{padding:'14px 16px'}},
      h('div',{style:{marginBottom:14}},
        h('div',{style:{color:C.muted,fontSize:12,fontWeight:600,marginBottom:8,letterSpacing:0.5,textTransform:'uppercase'}},'Cliente'),
        data.clientes.length===0
          ?h('div',{style:{color:C.yellow,fontSize:14,padding:'10px 14px',background:C.yellow+'15',borderRadius:10,marginBottom:8}},'Nenhum cliente cadastrado.')
          :h('select',{value:form.clienteId,onChange:e=>f('clienteId')(e.target.value),style:{...inp_style,appearance:'none',WebkitAppearance:'none',marginBottom:8,color:form.clienteId?C.text:C.muted}},
              h('option',{value:''},'Selecione um cliente...'),
              data.clientes.map(c=>h('option',{key:c.id,value:c.id},c.nome+(c.telefone?' — '+c.telefone:'')))
            ),
        h('button',{onClick:onNovoCliente,style:{width:'100%',background:'transparent',border:'2px dashed '+C.accent,borderRadius:10,padding:10,color:C.accent,fontWeight:700,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}},
          h(Ic,{n:'plus',sz:16,c:C.accent}),' Cadastrar novo cliente'
        )
      ),
      h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,marginBottom:8}},'ITENS'),
      ...form.itens.map((it,i)=>h('div',{key:i,style:{background:C.surface,borderRadius:12,padding:12,marginBottom:8,border:'1px solid '+C.border}},
        h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:8}},
          h('span',{style:{color:C.muted,fontSize:12,fontWeight:700}},'ITEM '+(i+1)),
          form.itens.length>1?h('button',{onClick:()=>remItem(i),style:{background:'none',border:'none',cursor:'pointer',padding:2}},h(Ic,{n:'close',sz:16,c:C.red})):null
        ),
        h('input',{value:it.desc,onChange:e=>upItem(i,'desc',e.target.value),placeholder:'Descrição',style:{...inp_style,marginBottom:8}}),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
          h('div',null,h('div',{style:{color:C.muted,fontSize:11,marginBottom:4}},'Qtd'),h('input',{value:it.qtd,onChange:e=>upItem(i,'qtd',maskBRL(e.target.value)),inputMode:'numeric',placeholder:'0',style:inp_style})),
          h('div',null,h('div',{style:{color:C.muted,fontSize:11,marginBottom:4}},'Valor unit. (R$)'),h('input',{value:it.unit,onChange:e=>upItem(i,'unit',maskBRL(e.target.value)),inputMode:'numeric',placeholder:'0,00',style:inp_style}))
        ),
        it.qtd&&it.unit?h('div',{style:{textAlign:'right',color:C.green,fontSize:13,fontWeight:700,marginTop:6}},'R$ '+fmtNum(parseBRL(it.qtd)*parseBRL(it.unit))):null
      )),
      h('button',{onClick:addItem,style:{width:'100%',background:'transparent',border:'2px dashed '+C.border,borderRadius:12,padding:12,color:C.muted,fontWeight:700,fontSize:15,cursor:'pointer',marginBottom:14}},'+ Adicionar item'),
      h('div',{style:{background:C.accentDim,borderRadius:12,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}},
        h('span',{style:{fontWeight:700}},'Total'),
        h('span',{style:{color:C.green,fontWeight:900,fontSize:20}},'R$ '+fmtNum(totalItens(form.itens)))
      ),
      h(Sel,{label:'Status',value:form.status,onChange:f('status'),options:Object.entries(STATUS_ORC).map(([v,s])=>({v,l:s.label}))}),
      h(Field,{label:'Observações',value:form.observacoes,onChange:f('observacoes'),multiline:true,placeholder:'Validade, condições...'}),
      h('div',{style:{display:'flex',gap:10,marginTop:8,paddingBottom:140,justifyContent:'flex-end'}},
        sel?h(Btn,{small:true,label:'Excluir',onClick:()=>setConf(true),color:C.red,outline:true,icon:'trash'}):null,
        h(Btn,{small:true,label:'Salvar',onClick:save,color:C.green,icon:'check'})
      )
    )
  );
};

/* ═══ DASHBOARD ═══ */
const Dashboard = ({data,setTab,setData}) => {
  const [syncModal,setSyncModal] = useState(false);
  const syncOk = !!getSyncCode();

  const Stat = ({label,value,color,tab}) =>
    h('div',{onClick:()=>setTab(tab),style:{background:C.card,borderRadius:14,padding:'14px 16px',border:'1px solid '+C.border,cursor:'pointer'}},
      h('div',{style:{fontSize:28,fontWeight:900,color}},value),
      h('div',{style:{color:C.muted,fontSize:12,fontWeight:600,marginTop:2}},label)
    );

  return h('div',null,
    syncModal?h(SyncModal,{onClose:()=>setSyncModal(false),setData,data}):null,
    h('div',{style:{background:C.bg,borderBottom:'1px solid '+C.border,padding:'10px 16px 8px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
      h('img',{src:LOGO_SRC,alt:'Point Tech',style:{height:56,objectFit:'contain',display:'block'}}),
      h('button',{onClick:()=>setSyncModal(true),style:{background:syncOk?C.green+'22':'#2a1a1a',border:'1px solid '+(syncOk?C.green:C.red),borderRadius:10,padding:'6px 12px',color:syncOk?C.green:C.red,fontSize:12,fontWeight:700,cursor:'pointer'}},syncOk?'Sync':'Sync')
    ),
    h('div',{style:{padding:'16px 16px'}},
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}},
        h(Stat,{label:'OS Abertas',value:data.ordens.filter(o=>o.status==='aberta').length,color:C.yellow,tab:'os'}),
        h(Stat,{label:'Em andamento',value:data.ordens.filter(o=>o.status==='em_andamento').length,color:C.accent,tab:'os'}),
        h(Stat,{label:'Concluidas',value:data.ordens.filter(o=>['concluida','entregue'].includes(o.status)).length,color:C.green,tab:'os'}),
        h(Stat,{label:'Orc. Pendentes',value:data.orcamentos.filter(o=>o.status==='pendente').length,color:C.yellow,tab:'orc'})
      ),
      h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,marginBottom:10}},'RECENTES'),
      data.ordens.length===0?h(Empty,{msg:'Nenhuma OS. Comece cadastrando um cliente!'}):
      data.ordens.slice(-4).reverse().map(o=>{
        const c=data.clientes.find(cl=>cl.id===o.clienteId);
        return h(Card,{key:o.id,onClick:()=>setTab('os')},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
            h('div',{style:{flex:1,minWidth:0,marginRight:8}},
              h('div',{style:{fontWeight:700,fontSize:14,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},(c?.nome||'—')+' · '+o.numero),
              h('div',{style:{color:C.muted,fontSize:12,marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},o.descricao)
            ),
            h(Badge,{...STATUS_OS[o.status]})
          )
        );
      })
    )
  );
};

/* ═══ APP ROOT ═══ */
function App() {
  // Restaura a Master Key do JSONBin IMEDIATAMENTE, antes de qualquer salvamento
  try{ const c=localStorage.getItem('os_synccode_v1'); if(c) window._syncCode=c; }catch{}

  const [tab,setTab] = useState('home');
  const [data,setData] = useState(loadData);
  const [booted,setBooted] = useState(false);

  // Na primeira montagem, se tiver chave configurada, busca os dados da nuvem automaticamente
  useEffect(()=>{
    (async ()=>{
      const code = getSyncCode();
      if(code){
        const cloud = await loadCloud(code);
        if(cloud) setData(cloud);
      }
      setBooted(true);
    })();
  },[]);

  useEffect(()=>{ if(booted) saveData(data); },[data,booted]);

  const tabs = [
    {id:'home',     label:'Painel',    icon:'home'  },
    {id:'clientes', label:'Clientes',  icon:'users' },
    {id:'produtos', label:'Produtos',  icon:'box'   },
    {id:'servicos', label:'Serviços',  icon:'tool'  },
    {id:'os',       label:'OS',        icon:'wrench'},
    {id:'orc',      label:'Orç.',      icon:'dollar'},
  ];

  const [isDesktop,setIsDesktop] = useState(typeof window!=='undefined' && window.innerWidth >= 820);
  useEffect(()=>{
    const onResize = () => setIsDesktop(window.innerWidth >= 820);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  },[]);

  const innerApp = h('div',{style:{background:C.bg,minHeight:isDesktop?'100%':'100vh',width:'100%',fontFamily:"-apple-system,'Inter',sans-serif",color:C.text,position:'relative'}},
    h('div',{style:{paddingBottom:72}},
      tab==='home'    ?h(Dashboard, {data,setTab,setData}):null,
      tab==='os'      ?h(Ordens,    {data,setData,onNovoCliente:()=>setTab('clientes')}):null,
      tab==='orc'     ?h(Orcamentos,{data,setData,onNovoCliente:()=>setTab('clientes')}):null,
      tab==='clientes'?h(Clientes,  {data,setData}):null,
      tab==='produtos'?h(Produtos,  {data,setData}):null,
      tab==='servicos'?h(Servicos,  {data,setData}):null,
    ),
    h('div',{style:{position:isDesktop?'absolute':'fixed',bottom:0,left:isDesktop?0:'50%',transform:isDesktop?'none':'translateX(-50%)',width:'100%',maxWidth:isDesktop?'none':430,background:C.surface,borderTop:'1px solid '+C.border,display:'flex',zIndex:100,paddingBottom:'env(safe-area-inset-bottom)'}},
      tabs.map(t=>h('button',{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,background:'none',border:'none',cursor:'pointer',padding:'8px 0 10px',display:'flex',flexDirection:'column',alignItems:'center',gap:3,color:tab===t.id?C.accent:C.muted}},
        h(Ic,{n:t.icon,sz:20,c:tab===t.id?C.accent:C.muted}),
        h('span',{style:{fontSize:9,fontWeight:700,letterSpacing:0.2}},t.label)
      ))
    )
  );

  if(!isDesktop){
    return innerApp;
  }

  // Layout desktop: fundo decorativo com o app centralizado em moldura tipo celular
  return h('div',{style:{minHeight:'100vh',width:'100%',background:'linear-gradient(135deg, #0a0c10 0%, #161a26 50%, #0a0c10 100%)',display:'flex',alignItems:'center',justifyContent:'center',padding:'40px 20px',fontFamily:"-apple-system,'Inter',sans-serif"}},
    h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:24}},
      h('img',{src:LOGO_SRC,alt:'Point Tech',style:{height:48,objectFit:'contain'}}),
      h('div',{style:{width:430,height:'min(880px, 92vh)',background:C.bg,borderRadius:32,overflow:'hidden',position:'relative',boxShadow:'0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06)',border:'8px solid #1a1d27'}},
        h('div',{style:{position:'absolute',inset:0,overflowY:'auto',WebkitOverflowScrolling:'touch'}}, innerApp)
      ),
      h('div',{style:{color:'#5a6080',fontSize:13,textAlign:'center',maxWidth:400}},'Acesse pelo celular para usar como atalho na tela de inicio com PDF e WhatsApp integrados.')
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));

  </script>
</body>
</html>
