/* ── SINCRONIZACAO AUTOMATICA E INSTANTANEA (Firebase Realtime Database) ──
   URL fixa embutida no app. Nao exige nenhuma configuracao do usuario.
   Usa o stream SSE do Firebase para receber mudancas em tempo real, sem polling. */
const FB_BASE = 'https://pointtechos-default-rtdb.firebaseio.com';
const FB_PATH = '/pointtech_dados.json';
window._syncStatus = {ok:null,msg:''};
window._lastRemoteJson = '';
window._suppressNextSave = false; // evita re-enviar o que acabou de chegar via stream

const loadCloud = async () => {
  try{
    const r = await fetch(FB_BASE+FB_PATH);
    if(!r.ok){ window._syncStatus={ok:false,msg:'Erro '+r.status}; return null; }
    const txt = await r.text();
    if(txt==='null'||!txt){ window._syncStatus={ok:false,msg:'Sem dados na nuvem ainda'}; return null; }
    const d = JSON.parse(txt);
    window._lastRemoteJson = JSON.stringify(d);
    window._syncStatus={ok:true,msg:'ok'};
    return {...EMPTY,...d};
  }catch(e){ window._syncStatus={ok:false,msg:e.message}; return null; }
};

const saveCloud = async (data) => {
  const json = JSON.stringify(data);
  if(json===window._lastRemoteJson) return;
  try{
    const r = await fetch(FB_BASE+FB_PATH, {method:'PUT', headers:{'Content-Type':'application/json'}, body:json});
    if(!r.ok){ window._syncStatus={ok:false,msg:'Erro '+r.status}; return; }
    window._lastRemoteJson = json;
    window._syncStatus={ok:true,msg:'ok'};
  }catch(e){ window._syncStatus={ok:false,msg:e.message}; }
};

// Stream de eventos em tempo real do Firebase (Server-Sent Events).
// Chama onUpdate(novosDados) instantaneamente quando QUALQUER dispositivo salva.
const streamCloud = (onUpdate) => {
  let es;
  try{
    es = new EventSource(FB_BASE+FB_PATH+'?ndjson=false', {});
  }catch(e){ return null; }
  es.addEventListener('put', (ev)=>{
    try{
      const payload = JSON.parse(ev.data);
      const val = payload && payload.data!==undefined ? payload.data : null;
      if(val){
        const json = JSON.stringify(val);
        if(json!==window._lastRemoteJson){
          window._lastRemoteJson = json;
          onUpdate({...EMPTY,...val});
        }
      }
    }catch(e){}
  });
  es.addEventListener('patch', (ev)=>{
    try{
      const payload = JSON.parse(ev.data);
      if(payload && payload.data){
        loadCloud().then(d=>{ if(d) onUpdate(d); });
      }
    }catch(e){}
  });
  es.onerror = () => { /* o navegador tenta reconectar automaticamente */ };
  return es;
};

const loadData = () => loadLocal()||EMPTY;
const saveData = (d) => { saveLocal(d); saveCloud(d); };

const setStoredCredId = (id) => { try{localStorage.setItem(WEBAUTHN_KEY,id);}catch{} };

const registerBiometric = async (username) => {
  if(!isWebAuthnSupported()) return {ok:false,msg:'Face ID/Touch ID nao disponivel neste navegador'};
  try{
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);
    const userId = new Uint8Array(16);
    crypto.getRandomValues(userId);
    const cred = await navigator.credentials.create({
      publicKey:{
        challenge,
        rp:{ name:'Point Tech OS' },
        user:{ id:userId, name:username, displayName:username },
        pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
        authenticatorSelection:{ authenticatorAttachment:'platform', userVerification:'required' },
        timeout:60000,
      }
    });
    if(cred && cred.id){ setStoredCredId(cred.id); return {ok:true}; }
    return {ok:false,msg:'Nao foi possivel registrar'};
  }catch(e){ return {ok:false,msg:e.message||'Erro ao configurar Face ID/Touch ID'}; }
};

const verifyBiometric = async () => {
  if(!isWebAuthnSupported()) return {ok:false,msg:'Face ID/Touch ID nao disponivel'};
  const credId = getStoredCredId();
  if(!credId) return {ok:false,msg:'Face ID/Touch ID nao configurado'};
  try{
    const challenge = new Uint8Array(32);
    crypto.getRandomValues(challenge);
    const idBytes = Uint8Array.from(credId.match(/.{1,2}/g)?credId.match(/.{1,2}/g).map(b=>parseInt(b,16)):[]);
    const assertion = await navigator.credentials.get({
      publicKey:{
        challenge,
        allowCredentials:[{id:new TextEncoder().encode(credId), type:'public-key', transports:['internal']}],
        userVerification:'required',
        timeout:60000,
      }
    }).catch(async()=>{
      // Fallback simples: alguns navegadores aceitam sem allowCredentials especifico
      return await navigator.credentials.get({publicKey:{challenge,userVerification:'required',timeout:60000}});
    });
    if(assertion) return {ok:true};
    return {ok:false,msg:'Verificacao falhou'};
  }catch(e){ return {ok:false,msg:e.message||'Erro na verificacao biometrica'}; }
};

const buscarCnpj = async (cnpj, onFound, setMsg) => {
  const digits = cnpj.replace(/\D/g,'');
  if(digits.length!==14){ setMsg({t:'CNPJ deve ter 14 digitos',ok:false}); return; }
  setMsg({t:'Buscando dados do CNPJ...',ok:null});
  try{
    const r = await fetch('https://brasilapi.com.br/api/cnpj/v1/'+digits);
    if(!r.ok){ setMsg({t:'CNPJ nao encontrado',ok:false}); return; }
    const d = await r.json();
    onFound({
      nome: d.razao_social || d.nome_fantasia || '',
      telefone: d.ddd_telefone_1 ? d.ddd_telefone_1 : '',
      celular: d.ddd_telefone_2 ? d.ddd_telefone_2 : '',
      email: d.email || '',
      cep: d.cep || '',
      logradouro: (d.descricao_tipo_de_logradouro?d.descricao_tipo_de_logradouro+' ':'')+(d.logradouro||''),
      numero: d.numero || '',
      complemento: d.complemento || '',
      bairro: d.bairro || '',
      cidade: d.municipio || '',
      estado: d.uf || '',
    });
    setMsg({t:'Dados da empresa preenchidos!',ok:true});
  }catch(e){ setMsg({t:'Erro ao buscar CNPJ. Preencha manualmente.',ok:false}); }
};

const buscarCep = (cep, onFound, setMsg) => {
  const digits = cep.replace(/\D/g,'');
  if(digits.length!==8){setMsg({t:'CEP deve ter 8 digitos',ok:false});return;}
  setMsg({t:'Buscando...',ok:null});
  const cbName = '_vc_'+Date.now();
  const tid = setTimeout(()=>{
    try{delete window[cbName];}catch{}
    const s=document.getElementById(cbName); if(s)s.remove();
    // fallback local
    const p5=digits.slice(0,5),p4=digits.slice(0,4),p3=digits.slice(0,3);
    const m=PR_CEPS[p5]||PR_CEPS[p4]||PR_CEPS[p3];
    if(m){onFound({logradouro:'',bairro:m[0],localidade:m[1],uf:'PR'});setMsg({t:'Cidade e bairro preenchidos!',ok:true});}
    else setMsg({t:'CEP nao encontrado. Preencha manualmente.',ok:false});
  },5000);
  window[cbName]=(d)=>{
    clearTimeout(tid); try{delete window[cbName];}catch{}
    const s=document.getElementById(cbName); if(s)s.remove();
    if(d&&!d.erro){onFound({logradouro:d.logradouro||'',bairro:d.bairro||'',localidade:d.localidade||'',uf:d.uf||'PR'});setMsg({t:d.logradouro?'Endereço completo!':'Cidade e bairro preenchidos!',ok:true});}
    else{
      const p5=digits.slice(0,5),p4=digits.slice(0,4),p3=digits.slice(0,3);
      const m=PR_CEPS[p5]||PR_CEPS[p4]||PR_CEPS[p3];
      if(m){onFound({logradouro:'',bairro:m[0],localidade:m[1],uf:'PR'});setMsg({t:'Cidade e bairro preenchidos!',ok:true});}
      else setMsg({t:'CEP nao encontrado.',ok:false});
    }
  };
  const sc=document.createElement('script'); sc.id=cbName;
  sc.src='https://viacep.com.br/ws/'+digits+'/json/?callback='+cbName;
  sc.onerror=()=>{clearTimeout(tid);try{delete window[cbName];}catch{};sc.remove();setMsg({t:'Servico indisponivel.',ok:false});};
  document.head.appendChild(sc);
};

  t+='No: '+numero+'\nCliente: '+cliNome+'\nStatus: '+status+'\n';
  if(descricao) t+='Servico: '+descricao+'\n';
  if(itens&&itens.length){t+='\nItens:\n';itens.forEach(i=>{const s=parseBRL(i.qtd||'0')*parseBRL(i.unit||'0');t+='  * '+i.desc+' ('+i.qtd+'x R$ '+fmtNum(parseBRL(i.unit||'0'))+') = R$ '+fmtNum(s)+'\n';});}
  if(valor) t+='\nTotal: R$ '+fmtNum(parseBRL(valor))+'\n';
  if(obs) t+='\nObs: '+obs+'\n';
  t+='━━━━━━━━━━━━━━━━━━━━\nPoint Tech Informatica - CNPJ 45.686.684/0001-65';
  return t;
};

/* ── PressCard (long press) ── */
const PressCard = ({children,style:cs={},onTap,onLong}) => {
  const timer=useRef(null),fired=useRef(false),startY=useRef(0);
  const onTS=(e)=>{fired.current=false;startY.current=e.touches[0].clientY;timer.current=setTimeout(()=>{fired.current=true;onLong&&onLong();},600);};
  const onTE=(e)=>{clearTimeout(timer.current);const dy=Math.abs(e.changedTouches[0].clientY-startY.current);if(!fired.current&&dy<8)onTap&&onTap();};
  const onTM=(e)=>{if(Math.abs(e.touches[0].clientY-startY.current)>8)clearTimeout(timer.current);};
  return h('div',{onTouchStart:onTS,onTouchEnd:onTE,onTouchMove:onTM,onClick:onTap,
    style:{background:C.card,borderRadius:14,padding:'14px 16px',border:'1px solid '+C.border,marginBottom:10,cursor:'pointer',userSelect:'none',WebkitUserSelect:'none',...cs}},children);
};

const DocModal = ({doc,onClose}) => {
  if(!doc) return null;
  const abrirDoc = () => {
    try {
      const blob = new Blob([doc.html], {type:'text/html'});
      const url = URL.createObjectURL(blob);
      const w = window.open(url, '_blank');
      if(!w){
        // Popup bloqueado - navega na mesma aba (usuario volta pelo botao Fechar do PDF ou gesto do Safari)
        window.location.href = url;
      }
    } catch(e) {
      const w=window.open('','_blank');
      if(w){w.document.open();w.document.write(doc.html);w.document.close();}
    }
  };
  const enviarWA = () => { const tel=(doc.tel||'').replace(/\D/g,''); const msg=encodeURIComponent(doc.waText||''); window.open(tel?'https://wa.me/55'+tel+'?text='+msg:'https://wa.me/?text='+msg,'_blank'); };
  return h('div',{style:{position:'fixed',inset:0,background:'#000c',zIndex:9999,display:'flex',alignItems:'flex-end',justifyContent:'center'}},
    h('div',{style:{background:C.surface,borderRadius:'20px 20px 0 0',padding:'24px 20px 44px',width:'100%',maxWidth:430,border:'1px solid '+C.border}},
      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}},
        h('span',{style:{color:C.text,fontWeight:800,fontSize:17}},doc.numero),
        h('button',{onClick:onClose,style:{background:'transparent',border:'2px solid '+C.border,borderRadius:10,padding:'6px 12px',color:C.muted,fontWeight:700,fontSize:13,cursor:'pointer'}},'Fechar')
      ),
      h('div',{style:{background:C.card,borderRadius:12,padding:'12px 14px',marginBottom:18,fontSize:13,color:C.muted,lineHeight:1.6}},
        h('strong',{style:{color:C.text,display:'block',marginBottom:4}},'Como enviar o PDF pelo WhatsApp:'),
        '1. Toque em "Abrir documento"',h('br'),'2. No documento, toque em "Compartilhar / WhatsApp"',h('br'),'3. Para voltar, toque em "Fechar" no topo do documento ou deslize da borda esquerda da tela'
      ),
      h('div',{style:{display:'flex',flexDirection:'column',gap:12}},
        h('button',{onClick:abrirDoc,style:{width:'100%',background:C.accent,border:'none',borderRadius:14,padding:15,color:'#fff',fontWeight:800,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10}},
          'Abrir documento (PDF)'
        ),
        h('button',{onClick:enviarWA,style:{width:'100%',background:'#25D366',border:'none',borderRadius:14,padding:15,color:'#fff',fontWeight:800,fontSize:16,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10}},
          h(Ic,{n:'wa',sz:22,c:'#fff'}),' Enviar texto WhatsApp'
        )
      )
    )
  );
};

/* ── DOC FIELD (CPF/CNPJ com busca automatica) ── */
const DocField = ({value,onChange,onFoundCnpj}) => {
  const [msg,setMsg] = useState(null);
  const [load,setLoad] = useState(false);
  const handleChange = (e) => {
    const v = maskDoc(e.target.value);
    onChange(v);
    setMsg(null);
    const digits = v.replace(/\D/g,'');
    if(digits.length===14){
      setLoad(true);
      buscarCnpj(v, (d)=>{onFoundCnpj(d);setLoad(false);}, (m)=>{setMsg(m);setLoad(false);});
    }
  };
  return h('div',{style:{marginBottom:14}},
    h('div',{style:{color:C.muted,fontSize:12,fontWeight:600,marginBottom:5,letterSpacing:0.5,textTransform:'uppercase'}},'CPF / CNPJ'),
    h('input',{value,onChange:handleChange,placeholder:'000.000.000-00',maxLength:18,inputMode:'numeric',
      style:{...inp_style,borderColor:msg?(msg.ok?C.green:C.red):C.border}}),
    load?h('div',{style:{fontSize:12,marginTop:4,color:C.accent}},'Buscando dados da empresa...'):null,
    msg?h('div',{style:{fontSize:12,marginTop:4,color:msg.ok?C.green:C.red}},msg.t):null
  );
};

/* ── CEP FIELD ── */
const CepField = ({cep,onChange,onFound}) => {
  const [msg,setMsg] = useState(null);
  const [load,setLoad] = useState(false);
  const buscar = (raw) => {
    setLoad(true);
    buscarCep(raw||cep, (d)=>{onFound(d);setLoad(false);}, (m)=>{setMsg(m);setLoad(false);});
  };
  const handleChange = (e) => { const v=maskCep(e.target.value); onChange(v); setMsg(null); if(v.replace(/\D/g,'').length===8) buscar(v); };
  return h('div',{style:{marginBottom:14}},
    h('div',{style:{color:C.muted,fontSize:12,fontWeight:600,marginBottom:5,letterSpacing:0.5,textTransform:'uppercase'}},'CEP'),
    h('div',{style:{display:'flex',gap:8}},
      h('input',{value:cep,onChange:handleChange,placeholder:'00000-000',maxLength:9,inputMode:'numeric',
        style:{...inp_style,flex:1,borderColor:msg?(msg.ok?C.green:C.red):C.border}}),
      h('button',{onClick:()=>buscar(cep),disabled:load,
        style:{background:C.accentDim,border:'2px solid '+C.accent,borderRadius:10,padding:'0 14px',cursor:load?'wait':'pointer',display:'flex',alignItems:'center',gap:6,color:C.accent,fontWeight:700,fontSize:14,whiteSpace:'nowrap',flexShrink:0}},
        h(Ic,{n:'search',sz:15,c:C.accent}), load?'...':'Buscar'
      )

    msg?h('div',{style:{fontSize:12,marginTop:4,color:msg.ok?C.green:C.red}},msg.t):null
  );
};

const Produtos = ({data,setData,onBack}) => {
  const [view,setView]=useState('list',[]);const [sel,setSel]=useState(null);const [form,setForm]=useState({nome:'',descricao:'',preco:''});const [conf,setConf]=useState(false);
  const f=k=>v=>setForm(p=>({...p,[k]:v}));
  const openNew=()=>{setForm({nome:'',descricao:'',preco:''});setSel(null);setView('form');};
  const openEdit=p=>{setForm({...p});setSel(p);setView('form');};
  const save=()=>{if(!form.nome.trim())return;setData(p=>{const produtos=sel?p.produtos.map(x=>x.id===sel.id?{...form,id:sel.id}:x):[...p.produtos,{...form,id:newId()}];return{...p,produtos};});setView('list');};
  const del=()=>{setData(p=>({...p,produtos:p.produtos.filter(x=>x.id!==sel.id)}));setConf(false);setView('list');};
  if(view==='list') return h('div',null,
    h(TopBar,{title:'Produtos',onBack,action:h(Btn,{small:true,label:'Novo',onClick:openNew,icon:'plus'})}),
    h('div',{style:{padding:'12px 16px'}},
      data.produtos.length===0?h(Empty,{msg:'Nenhum produto cadastrado'}):
      data.produtos.map(p=>h(Card,{key:p.id,onClick:()=>{setSel(p);setView('form');}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
          h('div',null,h('div',{style:{fontWeight:700,fontSize:15,color:C.text}},p.nome),p.descricao?h('div',{style:{color:C.muted,fontSize:13,marginTop:2}},p.descricao):null),
          p.preco?h('div',{style:{fontWeight:800,color:C.green,fontSize:15}},'R$ '+fmtNum(parseBRL(p.preco))):null
        )
      ))
    )
  );
  return h('div',null,
    conf?h(ConfirmModal,{msg:'Excluir "'+sel?.nome+'"?',onOk:del,onCancel:()=>setConf(false)}):null,
    h(TopBar,{title:sel?'Editar Produto':'Novo Produto',onBack:()=>setView('list')}),
    h('div',{style:{padding:'14px 16px'}},
      h(Field,{label:'Nome *',value:form.nome,onChange:f('nome'),placeholder:'Ex: Tela iPhone 13'}),
      h(Field,{label:'Descricao',value:form.descricao,onChange:f('descricao'),placeholder:'Detalhes',multiline:true}),
      h(ValorField,{label:'Preco',value:form.preco,onChange:f('preco')}),
      h('div',{style:{display:'flex',gap:10,marginTop:8,paddingBottom:140,justifyContent:'flex-end'}},
        sel?h(Btn,{small:true,label:'Excluir',onClick:()=>setConf(true),color:C.red,outline:true,icon:'trash'}):null,
        h(Btn,{small:true,label:'Salvar',onClick:save,color:C.green,icon:'check',disabled:!form.nome.trim()})
      )
    )
  );
};

/* ═══ PDV (PONTO DE VENDA) ═══ */
const PAGAMENTOS = [
  {v:'dinheiro', l:'Dinheiro'},
  {v:'pix',      l:'Pix'},
  {v:'debito',   l:'Cartao de Debito'},
  {v:'credito',  l:'Cartao de Credito'},
];

const PDV = ({data,setData,onBack}) => {
  const [carrinho,setCarrinho] = useState([]); // [{tipo:'produto'|'servico', nome, qtd, unit}]
  const [pagamento,setPagamento] = useState('dinheiro');
  const [clienteId,setClienteId] = useState('');
  const [busca,setBusca] = useState('');
  const [vendaFinalizada,setVendaFinalizada] = useState(null);

  const total = carrinho.reduce((s,i)=>s+parseBRL(i.qtd||'1')*parseBRL(i.unit||'0'),0);

  const addItem = (item,tipo) => {
    setCarrinho(prev=>{
      const idx = prev.findIndex(p=>p.nome===item.nome && p.tipo===tipo);
      if(idx>=0){
        const novo=[...prev];
        novo[idx]={...novo[idx], qtd: String(parseBRL(novo[idx].qtd||'1')+1)};
        return novo;
      }
      return [...prev,{tipo,nome:item.nome,qtd:'1',unit:item.preco?fmtNum(parseBRL(item.preco)):'0,00'}];
    });
  };

  const upQtd = (i,v) => setCarrinho(prev=>prev.map((it,idx)=>idx===i?{...it,qtd:v}:it));
  const upUnit = (i,v) => setCarrinho(prev=>prev.map((it,idx)=>idx===i?{...it,unit:v}:it));
  const remItem = (i) => setCarrinho(prev=>prev.filter((_,idx)=>idx!==i));
  const limparCarrinho = () => { setCarrinho([]); setClienteId(''); };

  const finalizarVenda = () => {
    if(carrinho.length===0) return;
    const venda = {
      id: newId(),
      numero: 'VND-'+String(1+(data.vendas?.length||0)),
      data: today(),
      hora: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
      itens: carrinho.map(i=>({...i})),
      total: fmtNum(total),
      pagamento,
      clienteId: clienteId||null,
    };
    setData(p=>({...p, vendas:[...(p.vendas||[]),venda]}));
    setVendaFinalizada(venda);
    setCarrinho([]);
    setClienteId('');
  };

  const itensFiltrados = (lista,termo) => {
    if(!termo.trim()) return lista;
    const t = termo.toLowerCase();
    return lista.filter(i=>i.nome.toLowerCase().includes(t));
  };

  if(vendaFinalizada){
    const cli = data.clientes.find(c=>c.id===vendaFinalizada.clienteId);
    return h('div',null,
      h(TopBar,{title:'Venda Finalizada'}),
      h('div',{style:{padding:'14px 16px'}},
        h('div',{style:{textAlign:'center',padding:'24px 0'}},
          h('div',{style:{width:64,height:64,borderRadius:'50%',background:C.green+'22',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 14px'}},
            h(Ic,{n:'check',sz:32,c:C.green})
          ),
          h('div',{style:{fontSize:20,fontWeight:800,color:C.text,marginBottom:4}},vendaFinalizada.numero),
          h('div',{style:{color:C.muted,fontSize:13}},vendaFinalizada.data+' às '+vendaFinalizada.hora)
        ),
        h(Card,{style:{padding:'14px 16px',marginBottom:10}},
          h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,marginBottom:8}},'ITENS'),
          ...vendaFinalizada.itens.map((it,i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',marginBottom:6}},
            h('span',{style:{fontSize:14,color:C.text}},it.nome+' ('+it.qtd+'x)'),
            h('span',{style:{fontSize:14,fontWeight:700,color:C.green}},'R$ '+fmtNum(parseBRL(it.qtd)*parseBRL(it.unit)))
          ))
        ),
        cli?h(Card,{style:{padding:'12px 16px',marginBottom:10}},h('div',{style:{display:'flex',justifyContent:'space-between'}},h('span',{style:{color:C.muted,fontSize:13}},'Cliente'),h('span',{style:{fontWeight:700}},cli.nome))):null,
        h(Card,{style:{padding:'12px 16px',marginBottom:10}},h('div',{style:{display:'flex',justifyContent:'space-between'}},h('span',{style:{color:C.muted,fontSize:13}},'Pagamento'),h('span',{style:{fontWeight:700}},(PAGAMENTOS.find(p=>p.v===vendaFinalizada.pagamento)||{}).l))),
        h('div',{style:{background:C.accentDim,borderRadius:12,padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}},
          h('span',{style:{fontWeight:700}},'Total'),
          h('span',{style:{color:C.green,fontWeight:900,fontSize:22}},'R$ '+vendaFinalizada.total)
        ),
        h(Btn,{full:true,label:'Nova venda',onClick:()=>setVendaFinalizada(null),color:C.accent,icon:'plus'})
      )
    );
  }

  return h('div',null,
    h(TopBar,{title:'PDV - Ponto de Venda',onBack}),
    h('div',{style:{padding:'12px 16px',paddingBottom:carrinho.length>0?260:20}},
      h(Field,{label:'Buscar produto ou serviço',value:busca,onChange:setBusca,placeholder:'Digite para buscar...'}),

      h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,marginBottom:8,marginTop:8}},'PRODUTOS'),
      itensFiltrados(data.produtos,busca).length===0?h('div',{style:{color:C.muted,fontSize:13,marginBottom:10}},'Nenhum produto encontrado.'):
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}},
        ...itensFiltrados(data.produtos,busca).map(p=>h('button',{key:p.id,onClick:()=>addItem(p,'produto'),style:{background:C.card,border:'1px solid '+C.border,borderRadius:12,padding:'12px 10px',textAlign:'left',cursor:'pointer'}},
          h('div',{style:{fontWeight:700,fontSize:13,color:C.text,marginBottom:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},p.nome),
          h('div',{style:{color:C.green,fontWeight:800,fontSize:14}},p.preco?'R$ '+fmtNum(parseBRL(p.preco)):'—')
        ))
      ),

      h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,marginBottom:8}},'SERVIÇOS'),
      itensFiltrados(data.servicos,busca).length===0?h('div',{style:{color:C.muted,fontSize:13,marginBottom:10}},'Nenhum serviço encontrado.'):
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}},
        ...itensFiltrados(data.servicos,busca).map(s=>h('button',{key:s.id,onClick:()=>addItem(s,'servico'),style:{background:C.card,border:'1px solid '+C.border,borderRadius:12,padding:'12px 10px',textAlign:'left',cursor:'pointer'}},
          h('div',{style:{fontWeight:700,fontSize:13,color:C.text,marginBottom:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},s.nome),
          h('div',{style:{color:C.green,fontWeight:800,fontSize:14}},s.preco?'R$ '+fmtNum(parseBRL(s.preco)):'—')
        ))

const Ordens = ({data,setData,onNovoCliente,initialOsId,onBack}) => {
  const [view,setView]=useState(initialOsId?'detail':'list');

  const [form,setForm]=useState(BLANK_OS);
  const [conf,setConf]=useState(false);const [stMod,setStMod]=useState(null);const [doc,setDoc]=useState(null);
  const f=k=>v=>setForm(p=>({...p,[k]:v}));
  const cliNome=id=>data.clientes.find(c=>c.id===id)?.nome||'—';
  const nextNum=()=>'OS-'+String(1250+data.ordens.length);

  const totalItensOS = (frm) => {
    const tp=(frm.produtosOS||[]).reduce((s,i)=>s+parseBRL(i.qtd||'0')*parseBRL(i.unit||'0'),0);
    const ts=(frm.servicosOS||[]).reduce((s,i)=>s+parseBRL(i.qtd||'0')*parseBRL(i.unit||'0'),0);
    return tp+ts;
  };

  const openNew=()=>{setForm({...BLANK_OS,clienteId:'',produtosOS:[],servicosOS:[]});setSel(null);setView('form');};
  const openEdit=o=>{setForm({...BLANK_OS,...o,tecnico:o.tecnico||BLANK_OS.tecnico,produtosOS:o.produtosOS?o.produtosOS.map(i=>({...i})):[],servicosOS:o.servicosOS?o.servicosOS.map(i=>({...i})):[]});setSel(o);setView('form');};

  const addProdutoOS = (p) => setForm(prev=>({...prev,produtosOS:[...prev.produtosOS,{nome:p.nome,qtd:'1',unit:p.preco?fmtNum(parseBRL(p.preco)):'0,00'}]}));
  const addServicoOS = (s) => setForm(prev=>({...prev,servicosOS:[...prev.servicosOS,{nome:s.nome,qtd:'1',unit:s.preco?fmtNum(parseBRL(s.preco)):'0,00'}]}));
  const remProdutoOS = (i) => setForm(prev=>({...prev,produtosOS:prev.produtosOS.filter((_,idx)=>idx!==i)}));
  const remServicoOS = (i) => setForm(prev=>({...prev,servicosOS:prev.servicosOS.filter((_,idx)=>idx!==i)}));
  const upProdutoOS = (i,k,v) => setForm(prev=>({...prev,produtosOS:prev.produtosOS.map((it,idx)=>idx===i?{...it,[k]:v}:it)}));
  const upServicoOS = (i,k,v) => setForm(prev=>({...prev,servicosOS:prev.servicosOS.map((it,idx)=>idx===i?{...it,[k]:v}:it)}));

  const save=()=>{
    if(!form.descricao.trim()||!form.clienteId)return;
    const total = totalItensOS(form);
    const finalForm = {...form, valor: total>0?fmtNum(total):form.valor};
    setData(p=>{const ordens=sel?p.ordens.map(o=>o.id===sel.id?{...finalForm,id:sel.id,numero:sel.numero,data:sel.data}:o):[...p.ordens,{...finalForm,id:newId(),numero:nextNum(),data:today()}];return{...p,ordens};});
    setView('list');

          h('div',{style:{display:'flex',justifyContent:'space-between'}},
            h('span',{style:{color:C.muted,fontSize:13}},cliNome(o.clienteId)),

/* ═══ ORÇAMENTOS ═══ */
const BLANK_ORC={clienteId:'',itens:[{desc:'',qtd:'1',unit:''}],status:'pendente',observacoes:'',tecnico:'Tiago Roberto de Oliveira'};
const Orcamentos = ({data,setData,onNovoCliente,onBack}) => {
  const [view,setView]=useState('list');const [sel,setSel]=useState(null);const [form,setForm]=useState(BLANK_ORC);
  const [conf,setConf]=useState(false);const [stMod,setStMod]=useState(null);const [doc,setDoc]=useState(null);
  const f=k=>v=>setForm(p=>({...p,[k]:v}));
  const cliNome=id=>data.clientes.find(c=>c.id===id)?.nome||'—';
  const nextNum=()=>'ORC-'+String(data.orcamentos.length+1).padStart(3,'0');
  const totalItens=itens=>itens.reduce((s,i)=>s+parseBRL(i.qtd||'0')*parseBRL(i.unit||'0'),0);
  const openNew=()=>{setForm({...BLANK_ORC,clienteId:'',itens:[{desc:'',qtd:'1',unit:''}]});setSel(null);setView('form');};
  const openEdit=o=>{setForm({...BLANK_ORC,...o,tecnico:o.tecnico||BLANK_ORC.tecnico,itens:o.itens.map(i=>({...i}))});setSel(o);setView('form');};
  const addItem=()=>setForm(p=>({...p,itens:[...p.itens,{desc:'',qtd:'1',unit:''}]}));
  const remItem=i=>setForm(p=>({...p,itens:p.itens.filter((_,idx)=>idx!==i)}));
  const upItem=(i,k,v)=>setForm(p=>({...p,itens:p.itens.map((it,idx)=>idx===i?{...it,[k]:v}:it)}));
  const save=()=>{
    if(!form.clienteId||form.itens.some(i=>!i.desc.trim()))return;
    setData(p=>{const orcamentos=sel?p.orcamentos.map(o=>o.id===sel.id?{...form,id:sel.id,numero:sel.numero,data:sel.data}:o):[...p.orcamentos,{...form,id:newId(),numero:nextNum(),data:today()}];return{...p,orcamentos};});
    setView('list');
  };
  const del=()=>{setData(p=>({...p,orcamentos:p.orcamentos.filter(o=>o.id!==sel.id)}));setConf(false);setView('list');};
  const changeStatus=(id,status)=>{setData(p=>({...p,orcamentos:p.orcamentos.map(o=>o.id===id?{...o,status}:o)}));setSel(p=>p?.id===id?{...p,status}:p);setStMod(null);};
  const abrirDoc=(o)=>{
    const cli=data.clientes.find(c=>c.id===o.clienteId);
    const t=totalItens(o.itens);
    const html=buildPdf('Orçamento',o.numero,STATUS_ORC[o.status]?.label,cli,o.itens,[],null,t,o.observacoes,o.data,o.tecnico);
    const waText=textoWA('Orçamento',o.numero,STATUS_ORC[o.status]?.label,cli?.nome||'—',null,null,o.itens,o.observacoes);
    setDoc({html,numero:o.numero,tel:cli?.telefone||'',waText});
  };

  if(view==='list') return h('div',null,
    doc?h(DocModal,{doc,onClose:()=>setDoc(null)}):null,
    stMod?h(StatusModal,{title:'Status do Orcamento',current:data.orcamentos.find(o=>o.id===stMod)?.status,statuses:STATUS_ORC,onSelect:s=>changeStatus(stMod,s),onClose:()=>setStMod(null)}):null,
    h(TopBar,{title:'Orçamentos',onBack,action:h(Btn,{small:true,label:'Novo',onClick:openNew,icon:'plus'})}),
    h('div',{style:{padding:'12px 16px'}},
      data.orcamentos.length===0?h(Empty,{msg:'Nenhum orcamento'}):
      h('div',null,
        h('div',{style:{textAlign:'center',color:C.muted,fontSize:11,paddingBottom:8}},'Toque para abrir · Segure para mudar status'),
        ...data.orcamentos.map(o=>h(PressCard,{key:o.id,onTap:()=>{setSel({...o});setView('detail');},onLong:()=>setStMod(o.id)},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}},
            h('span',{style:{fontWeight:800,color:C.accent,fontSize:14}},o.numero),
            h(Badge,{...STATUS_ORC[o.status]})
          ),
          h('div',{style:{display:'flex',justifyContent:'space-between'}},
            h('span',{style:{color:C.muted,fontSize:13}},cliNome(o.clienteId)),
            h('span',{style:{fontWeight:800,color:C.green}},'R$ '+fmtNum(totalItens(o.itens)))
          )
        ))
      )
    )
  );

  if(view==='detail'){
    const o=sel; const cur=data.orcamentos.find(x=>x.id===o.id)||o;
    const cli=data.clientes.find(c=>c.id===o.clienteId);
    const waNum=(cli&&(cli.celular||cli.telefone))?(cli.celular||cli.telefone).replace(/\D/g,''):'';
    const conversarCliente=()=>{ if(waNum) window.open('https://wa.me/55'+waNum,'_blank'); };
    return h('div',null,
      doc?h(DocModal,{doc,onClose:()=>setDoc(null)}):null,
      stMod?h(StatusModal,{title:'Status do Orcamento',current:cur.status,statuses:STATUS_ORC,onSelect:s=>changeStatus(o.id,s),onClose:()=>setStMod(null)}):null,
      h(TopBar,{title:o.numero,onBack:()=>{setView('list');setSel(null);},
        action:h('div',{style:{display:'flex',gap:6}},
          h(Btn,{small:true,outline:true,label:'PDF',onClick:()=>abrirDoc(cur),icon:'wa',color:'#25D366'}),
          h(Btn,{small:true,outline:true,label:'Editar',onClick:()=>openEdit(cur),icon:'edit'})
        )
      }),
      h('div',{style:{padding:'14px 16px'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:10}},
          h(Badge,{...STATUS_ORC[cur.status]}),
          h('button',{onClick:()=>setStMod(o.id),style:{background:C.accentDim,border:'1px solid '+C.accent,borderRadius:8,padding:'6px 14px',color:C.accent,fontSize:14,fontWeight:700,cursor:'pointer'}},'Trocar status')
        ),
        h('div',{style:{color:C.muted,fontSize:13,marginBottom:10}},'Data: '+o.data+' - '+cliNome(o.clienteId)),
        ...cur.itens.map((it,i)=>h(Card,{key:i,style:{padding:'10px 14px'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
            h('div',null,h('div',{style:{fontWeight:600,color:C.text,fontSize:14}},it.desc),h('div',{style:{color:C.muted,fontSize:12,marginTop:2}},it.qtd+'x R$ '+fmtNum(parseBRL(it.unit||'0')))),
            h('span',{style:{fontWeight:700,color:C.green}},'R$ '+fmtNum(parseBRL(it.qtd||'0')*parseBRL(it.unit||'0')))
          )
        )),
        h('div',{style:{background:C.accentDim,borderRadius:12,padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}},
          h('span',{style:{fontWeight:700}},'Total'),
          h('span',{style:{color:C.green,fontWeight:900,fontSize:22}},'R$ '+fmtNum(totalItens(cur.itens)))
        ),
        cur.observacoes?h('div',null,h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,margin:'14px 0 8px'}},'OBSERVAÇÕES'),h(Card,null,h('div',{style:{color:C.text,fontSize:14,lineHeight:1.6}},cur.observacoes))):null,
        waNum?h('button',{onClick:conversarCliente,style:{marginTop:18,background:'#25D366',border:'none',borderRadius:12,padding:'10px 18px',color:'#fff',fontWeight:700,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}},h(Ic,{n:'wa',sz:16,c:'#fff'}),' Conversar com cliente'):null
      )
    );
  }

  return h('div',null,
    conf?h(ConfirmModal,{msg:'Excluir "'+sel?.numero+'"?',onOk:del,onCancel:()=>setConf(false)}):null,
    h(TopBar,{title:sel?'Editar Orçamento':'Novo Orçamento',onBack:()=>setView('list')}),
    h('div',{style:{padding:'14px 16px'}},
      h('div',{style:{marginBottom:14}},
        h('div',{style:{color:C.muted,fontSize:12,fontWeight:600,marginBottom:8,letterSpacing:0.5,textTransform:'uppercase'}},'Cliente'),
        data.clientes.length===0
          ?h('div',{style:{color:C.yellow,fontSize:14,padding:'10px 14px',background:C.yellow+'15',borderRadius:10,marginBottom:8}},'Nenhum cliente cadastrado.')
          :h('select',{value:form.clienteId,onChange:e=>f('clienteId')(e.target.value),style:{...inp_style,appearance:'none',WebkitAppearance:'none',marginBottom:8,color:form.clienteId?C.text:C.muted}},
              h('option',{value:''},'Selecione um cliente...'),
              data.clientes.map(c=>h('option',{key:c.id,value:c.id},c.nome+(c.telefone?' — '+c.telefone:'')))
            ),
        h('button',{onClick:onNovoCliente,style:{width:'100%',background:'transparent',border:'2px dashed '+C.accent,borderRadius:10,padding:10,color:C.accent,fontWeight:700,fontSize:14,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8}},
          h(Ic,{n:'plus',sz:16,c:C.accent}),' Cadastrar novo cliente'
        )
      ),
      h('div',{style:{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,marginBottom:8}},'ITENS'),
      ...form.itens.map((it,i)=>h('div',{key:i,style:{background:C.surface,borderRadius:12,padding:12,marginBottom:8,border:'1px solid '+C.border}},
        h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:8}},
          h('span',{style:{color:C.muted,fontSize:12,fontWeight:700}},'ITEM '+(i+1)),

const LoginScreen = ({onSuccess}) => {
  const cfg = getAuthConfig();
  const isSetup = !cfg; // primeira vez: precisa criar usuario, senha e pergunta de seguranca
  const [step,setStep] = useState(isSetup?'setup':'login'); // setup | login | recover | reset
  const [user,setUser] = useState('');
  const [pass,setPass] = useState('');
  const [pass2,setPass2] = useState('');
  const [question,setQuestion] = useState('');
  const [answer,setAnswer] = useState('');
  const [recoverAnswer,setRecoverAnswer] = useState('');
  const [newPass,setNewPass] = useState('');
  const [newPass2,setNewPass2] = useState('');
  const [showPass,setShowPass] = useState(false);
  const [err,setErr] = useState('');
  const [info,setInfo] = useState('');
  const [bioBusy,setBioBusy] = useState(false);
  const bioAvailable = isWebAuthnSupported() && !!getStoredCredId();

  const handleSetup = async () => {
    if(!user.trim()){setErr('Digite um nome de usuário');return;}
    if(pass.length<4){setErr('A senha deve ter ao menos 4 caracteres');return;}
    if(pass!==pass2){setErr('As senhas não coincidem');return;}
    if(!question.trim()){setErr('Escolha uma pergunta de segurança');return;}
    if(!answer.trim()){setErr('Digite a resposta da pergunta de segurança');return;}
    setAuthConfig({user:user.trim(),pass,question:question.trim(),answer:answer.trim().toLowerCase()});
    setLoggedIn(true);
    setErr('');
    onSuccess();
  };

  const handleLogin = () => {
    if(!cfg){setErr('Configuração não encontrada');return;}
    if(user.trim()===cfg.user && pass===cfg.pass){
      setLoggedIn(true);
      onSuccess();
    } else {
      setErr('Usuário ou senha incorretos');
    }
  };

  const handleBiometric = async () => {
    setBioBusy(true); setErr('');
    const r = await verifyBiometric();
    setBioBusy(false);
    if(r.ok){ setLoggedIn(true); onSuccess(); }
    else setErr(r.msg||'Não foi possível verificar Face ID/Touch ID');
  };

  const enableBiometric = async () => {
    setBioBusy(true); setErr(''); setInfo('');
    const r = await registerBiometric(cfg?.user||user||'usuario');
    setBioBusy(false);
    if(r.ok){ setInfo('Face ID/Touch ID configurado com sucesso!'); }
    else setErr(r.msg||'Não foi possível configurar');
  };

  const handleRecoverCheck = () => {
    if(!cfg){setErr('Configuração não encontrada');return;}
    if(recoverAnswer.trim().toLowerCase()===cfg.answer){
      setErr(''); setStep('reset');
    } else {
      setErr('Resposta incorreta');
    }
  };

  const handleReset = () => {
    if(newPass.length<4){setErr('A nova senha deve ter ao menos 4 caracteres');return;}
    if(newPass!==newPass2){setErr('As senhas não coincidem');return;}
    setAuthConfig({...cfg,pass:newPass});
    setErr(''); setInfo('Senha redefinida! Faça login com a nova senha.');
    setStep('login'); setPass(''); setNewPass(''); setNewPass2(''); setRecoverAnswer('');
  };

  const QUESTIONS = [
    'Nome da sua mãe',
    'Nome do seu primeiro animal de estimação',
    'Cidade onde você nasceu',
    'Nome da sua primeira escola',
    'Seu time de futebol',
  ];

    h('img',{src:LOGO_SRC,alt:'Point Tech',style:{height:96,objectFit:'contain',marginBottom:32}}),
    h('div',{style:{width:'100%',maxWidth:340}},

      step==='setup' ? h('div',null,
        h('div',{style:{textAlign:'center',marginBottom:24}},
          h('div',{style:{fontSize:19,fontWeight:800,color:C.text,marginBottom:4}},'Criar acesso'),
          h('div',{style:{fontSize:13,color:C.muted}},'Defina usuário, senha e uma pergunta de segurança')
        ),
        h(Field,{label:'Usuário',value:user,onChange:setUser,placeholder:'seu nome'}),
        h('div',{style:{marginBottom:14}},
          h('div',{style:{color:C.muted,fontSize:12,fontWeight:600,marginBottom:5,letterSpacing:0.5,textTransform:'uppercase'}},'Senha'),
          h('div',{style:{position:'relative'}},
            h('input',{type:showPass?'text':'password',value:pass,onChange:e=>setPass(e.target.value),placeholder:'••••••',style:{...inp_style,paddingRight:44}}),
            h('button',{onClick:()=>setShowPass(s=>!s),style:{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',padding:4}},h(Ic,{n:'eye',sz:18,c:C.muted}))

/* ── BOTAO DE MENU MOBILE (arrastavel via toque longo) ── */
const MobileTabBtn = ({t,activeTab,onSelect,onReorder}) => {
  const dragging = useRef(false);
  const longPressTimer = useRef(null);
  const startX = useRef(0);
  const startY = useRef(0);
  const [isDraggingState,setIsDraggingState] = useState(false);

  const lockBodyScroll = () => {
    document.body.style.overflow = 'hidden';
    document.body.style.touchAction = 'none';
  };
  const unlockBodyScroll = () => {
    document.body.style.overflow = '';
    document.body.style.touchAction = '';
  };

  const onTouchStart = (e) => {
    startX.current = e.touches[0].clientX;
    startY.current = e.touches[0].clientY;
    longPressTimer.current = setTimeout(()=>{
      dragging.current = true;
      setIsDraggingState(true);
      lockBodyScroll();
      if(navigator.vibrate) navigator.vibrate(12);
    }, 380);
  };
  const onTouchMove = (e) => {
    if(dragging.current){
      e.preventDefault();
      e.stopPropagation();
      const x = e.touches[0].clientX, y = e.touches[0].clientY;
      const el = document.elementFromPoint(x, y);
      const btn = el && el.closest('[data-tabid]');
      if(btn){
        const overId = btn.getAttribute('data-tabid');
        if(overId && overId!==t.id) onReorder(t.id, overId);
      }
    } else {
      const dx = Math.abs(e.touches[0].clientX-startX.current);
      const dy = Math.abs(e.touches[0].clientY-startY.current);
      if(dx>10||dy>10) clearTimeout(longPressTimer.current);
    }
  };
  const onTouchEnd = () => {
    clearTimeout(longPressTimer.current);
    if(dragging.current){
      dragging.current = false;
      setIsDraggingState(false);
      unlockBodyScroll();
    } else {
      unlockBodyScroll();
      onSelect(t.id);
    }
  };
  const onTouchCancel = () => {
    clearTimeout(longPressTimer.current);
    dragging.current = false;
    setIsDraggingState(false);
    unlockBodyScroll();
  };

  return h('button',{
    'data-tabid':t.id,
    onTouchStart,onTouchMove,onTouchEnd,onTouchCancel,
    style:{flex:'1 1 0',maxWidth:80,background:isDraggingState?C.accentDim:'none',borderRadius:isDraggingState?10:0,border:'none',cursor:'pointer',padding:'4px 2px 8px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,color:activeTab===t.id?C.accent:C.muted,minWidth:0,touchAction:'none',transform:isDraggingState?'scale(1.08)':'scale(1)',transition:'transform 0.12s',WebkitUserSelect:'none',userSelect:'none'}
  },
    h(Ic,{n:t.icon,sz:21,c:activeTab===t.id?C.accent:C.muted}),
    h('span',{style:{fontSize:9,fontWeight:700,letterSpacing:0.2,whiteSpace:'nowrap'}},t.label)
  );
};

const DraggableWindow = ({title,onClose,offsetIndex=0,zIndex=500,onFocus,children}) => {
  const defaultW = 640, defaultH = 720;
  const cascade = (offsetIndex%6)*32;
  const [pos,setPos] = useState({x:Math.max(20,(window.innerWidth-defaultW)/2)+cascade, y:Math.max(20,(window.innerHeight-defaultH)/2 - 40)+cascade});
  const [size,setSize] = useState({w:defaultW,h:defaultH});
  const [maximized,setMaximized] = useState(false);
  const dragRef = useRef(null);
  const resizeRef = useRef(null);

  const onDragStart = (e) => {
    onFocus&&onFocus();
    if(maximized) return;
    const startX=e.clientX, startY=e.clientY, startPos={...pos};
    dragRef.current = {startX,startY,startPos};
    const onMove = (ev) => {
      const dx=ev.clientX-startX, dy=ev.clientY-startY;
      setPos({x:Math.max(0,startPos.x+dx), y:Math.max(0,startPos.y+dy)});
    };
    const onUp = () => { window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); };
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  };

  const onResizeStart = (e) => {
    e.stopPropagation();
    onFocus&&onFocus();
    if(maximized) return;
    const startX=e.clientX, startY=e.clientY, startSize={...size};
    const onMove = (ev) => {
      const dx=ev.clientX-startX, dy=ev.clientY-startY;
      setSize({w:Math.max(360,startSize.w+dx), h:Math.max(300,startSize.h+dy)});
    };
    const onUp = () => { window.removeEventListener('mousemove',onMove); window.removeEventListener('mouseup',onUp); };
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
  };

  const winStyle = maximized
    ? {position:'fixed',top:0,left:0,width:'100vw',height:'100vh',borderRadius:0}
    : {position:'fixed',top:pos.y,left:pos.x,width:size.w,height:size.h,borderRadius:16};

  return h('div',{onMouseDown:()=>onFocus&&onFocus(),style:{...winStyle,background:C.bg,overflow:'hidden',boxShadow:'0 24px 70px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.08)',display:'flex',flexDirection:'column',zIndex}},
    h('div',{onMouseDown:onDragStart,onDoubleClick:()=>setMaximized(m=>!m),style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px',borderBottom:'1px solid '+C.border,flexShrink:0,cursor:maximized?'default':'move',userSelect:'none',background:C.surface}},
      h('span',{style:{fontWeight:800,fontSize:15,color:C.text}},title),
      h('div',{style:{display:'flex',gap:6}},
        h('button',{onClick:()=>setMaximized(m=>!m),style:{background:'transparent',border:'1px solid '+C.border,borderRadius:8,padding:'5px 10px',color:C.muted,fontWeight:700,fontSize:12,cursor:'pointer'}},maximized?'Restaurar':'Maximizar'),
        h('button',{onClick:onClose,style:{background:'transparent',border:'1px solid '+C.border,borderRadius:8,padding:'5px 10px',color:C.muted,fontWeight:700,fontSize:12,cursor:'pointer'}},'Fechar')
      )
    ),
    h('div',{style:{overflowY:'auto',flex:1}}, children),
    !maximized?h('div',{onMouseDown:onResizeStart,style:{position:'absolute',right:0,bottom:0,width:18,height:18,cursor:'nwse-resize'}},
      h('svg',{width:16,height:16,viewBox:'0 0 16 16',style:{position:'absolute',right:2,bottom:2}},
        h('path',{d:'M14 14L2 14M14 14L14 2M14 14L8 14M14 14L14 8',stroke:C.muted,strokeWidth:1.5})
      )
    ):null
  );
};

function App() {
  const [authed,setAuthed] = useState(isLoggedIn());
  const [tab,setTab] = useState('home'); // usado no mobile e como "ultima aba" no desktop
  const [data,setData] = useState(loadData);
  const [openWindows,setOpenWindows] = useState([]); // [{id, tabId}] - desktop: multiplas janelas
  const [booted,setBooted] = useState(false);

  // Ao abrir o app, sempre busca os dados mais recentes da nuvem ANTES de comecar
  // a salvar (evita sobrescrever com dados antigos). Sincronizacao 100% automatica.
  useEffect(()=>{
    (async()=>{
      const cloud = await loadCloud();
      if(cloud) setData(cloud);
      setBooted(true);
    })();
  },[]);

  useEffect(()=>{ if(booted) saveData(data); },[data,booted]);

  // Sincronizacao INSTANTANEA: escuta o stream em tempo real do Firebase.
  // Quando outro dispositivo salva, este recebe a atualizacao imediatamente,
  // sem precisar esperar nenhum intervalo de tempo.
  useEffect(()=>{
    if(!booted) return;
    const es = streamCloud((novosDados)=>{ setData(novosDados); });
    return () => { if(es) es.close(); };
  },[booted]);

  const BASE_TABS = [
    {id:'home',        label:'Painel',      icon:'home'  },
    {id:'clientes',    label:'Clientes',    icon:'users' },
    {id:'produtos',    label:'Produtos',    icon:'box'   },
    {id:'servicos',    label:'Serviços',    icon:'clip'  },
    {id:'os',          label:'OS',              icon:'wrench'},
    {id:'orc',         label:'Orçamentos',  icon:'dollar'},
    {id:'pdv',         label:'PDV',         icon:'pdv'   },
  ];
  const TAB_ORDER_KEY = 'os_tab_order_v1';
  const [tabOrder,setTabOrder] = useState(()=>{
    try{
      const saved = JSON.parse(localStorage.getItem(TAB_ORDER_KEY)||'null');
      if(Array.isArray(saved) && saved.length){
        // Garante que tabs novas (ex: pdv adicionado depois) sempre aparecam, mesmo que nao estivessem salvas
        const knownIds = BASE_TABS.map(t=>t.id);
        const merged = [...saved.filter(id=>knownIds.includes(id)), ...knownIds.filter(id=>!saved.includes(id))];
        return merged;
      }
    }catch{}
    return BASE_TABS.map(t=>t.id);
  });
  const saveTabOrder = (order) => { setTabOrder(order); try{localStorage.setItem(TAB_ORDER_KEY,JSON.stringify(order));}catch{} };
  const tabs = tabOrder.map(id=>BASE_TABS.find(t=>t.id===id)).filter(Boolean);

  // Drag and drop para reordenar os botoes do menu (mouse e touch)
  const [dragTabId,setDragTabId] = useState(null);
  const [dragOverTabId,setDragOverTabId] = useState(null);
  const reorderTabs = (fromId,toId) => {
    if(fromId===toId) return;
    setTabOrder(prevOrder => {
      const order=[...prevOrder];
      const fromIdx=order.indexOf(fromId), toIdx=order.indexOf(toId);
      if(fromIdx<0||toIdx<0) return prevOrder;
      order.splice(fromIdx,1);
      order.splice(toIdx,0,fromId);
      try{localStorage.setItem(TAB_ORDER_KEY,JSON.stringify(order));}catch{}
      return order;
    });
  };

  const handleLogout = () => { setLoggedIn(false); setAuthed(false); };

  const [isDesktop,setIsDesktop] = useState(typeof window!=='undefined' && window.innerWidth >= 820);
  useEffect(()=>{
    const onResize = () => setIsDesktop(window.innerWidth >= 820);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  },[]);

  // Desktop: abre uma nova janela para a aba (ou foca/traz pra frente se ja estiver aberta)
  const openDesktopWindow = (tabId) => {
    if(tabId==='home') return; // Painel nao abre em janela, fica sempre na base
    setOpenWindows(prev => {
      const existing = prev.find(w=>w.tabId===tabId);
      if(existing){
        // Ja esta aberta: move para o final da lista (fica por cima)
        return [...prev.filter(w=>w.tabId!==tabId), existing];
      }
      return [...prev, {id:newId(), tabId}];
    });
  };
  const closeDesktopWindow = (winId) => setOpenWindows(prev => prev.filter(w=>w.id!==winId));
  const focusDesktopWindow = (winId) => setOpenWindows(prev => {
    const w = prev.find(x=>x.id===winId);
    if(!w) return prev;
    return [...prev.filter(x=>x.id!==winId), w];
  });

  // Abre a OS especifica (vinda de "Recentes" no Dashboard), pulando direto para o detalhe
  const [pendingOsId,setPendingOsId] = useState(null);
  const openOsDetail = (osId) => {
    setPendingOsId(osId);
    if(isDesktop) openDesktopWindow('os');
    else setTab('os');
  };

  const renderContentFor = (tabId, setTabFn, extraProps) => {
    const goBack = () => setTabFn('home');
    return h('div',null,
      tabId==='home'    ?h(Dashboard, {data,setTab:setTabFn,setData,onLogout:handleLogout,onOpenOs:openOsDetail,...(extraProps||{})}):null,
      tabId==='os'      ?h(Ordens,    {data,setData,onNovoCliente:()=>setTabFn('clientes'),initialOsId:pendingOsId,key:pendingOsId||'os-list',onBack:goBack}):null,
      tabId==='orc'     ?h(Orcamentos,{data,setData,onNovoCliente:()=>setTabFn('clientes'),onBack:goBack}):null,
      tabId==='clientes'?h(Clientes,  {data,setData,onBack:goBack}):null,
      tabId==='produtos'?h(Produtos,  {data,setData,onBack:goBack}):null,
      tabId==='servicos'?h(Servicos,  {data,setData,onBack:goBack}):null,
      tabId==='pdv'     ?h(PDV,       {data,setData,onBack:goBack}):null,
    );
  };

  if(!authed){
    return h(LoginScreen,{onSuccess:()=>setAuthed(true)});
  }

  if(!isDesktop){
    // ── LAYOUT MOBILE: menu lateral com toggle (abrir/fechar) e opcao de fixar ──
    const [menuOpen,setMenuOpen] = useState(false);
    const [menuPinned,setMenuPinned] = useState(()=>{ try{return localStorage.getItem('os_menu_pinned_v1')==='1';}catch{return false;} });
    const togglePin = () => {
      const next = !menuPinned;
      setMenuPinned(next);
      try{localStorage.setItem('os_menu_pinned_v1', next?'1':'0');}catch{}
    };
    const drawerVisible = menuPinned || menuOpen;
    const drawerWidth = 188;

    const handleSelectTab = (id) => { setTab(id); if(!menuPinned) setMenuOpen(false); };

    return h('div',{style:{background:C.bg,minHeight:'100vh',width:'100%',fontFamily:"-apple-system,'Inter',sans-serif",color:C.text,position:'relative',display:'flex'}},
      // Overlay escuro quando o menu esta aberto (nao fixado) - toque fora fecha
      (menuOpen && !menuPinned) ? h('div',{onClick:()=>setMenuOpen(false),style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.45)',zIndex:199}}) : null,

      // Drawer lateral
      h('div',{style:{position:'fixed',top:0,left:drawerVisible?0:-drawerWidth,bottom:0,width:drawerWidth,background:C.surface,borderRight:'1px solid '+C.border,zIndex:200,transition:'left 0.22s ease',display:'flex',flexDirection:'column',paddingTop:'env(safe-area-inset-top)',boxShadow:drawerVisible?'4px 0 24px rgba(0,0,0,0.35)':'none'}},
        h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 12px 10px'}},
          h('img',{src:LOGO_SRC,alt:'PT',style:{height:30,objectFit:'contain'}}),
          h('button',{onClick:togglePin,title:menuPinned?'Desafixar menu':'Fixar menu',style:{background:menuPinned?C.accentDim:'transparent',border:'1px solid '+(menuPinned?C.accent:C.border),borderRadius:8,padding:6,cursor:'pointer',display:'flex'}},
            h(Ic,{n:'pin',sz:14,c:menuPinned?C.accent:C.muted})
          )
        ),
        h('div',{style:{flex:1,overflowY:'auto',padding:'4px 8px'}},
          tab!=='home'?h('button',{onClick:()=>handleSelectTab('home'),style:{width:'100%',background:'transparent',border:'none',borderRadius:10,padding:'11px 12px',marginBottom:8,cursor:'pointer',display:'flex',alignItems:'center',gap:10,color:C.accent,borderBottom:'1px solid '+C.border}},
            h(Ic,{n:'back',sz:16,c:C.accent}),
            h('span',{style:{fontSize:13,fontWeight:700}},'Voltar ao Painel')
          ):null,
          tabs.map(t=>h(MobileDrawerItem,{key:t.id,t,activeTab:tab,onSelect:handleSelectTab,onReorder:reorderTabs}))
        )
      ),

      // Conteudo principal
      h('div',{style:{flex:1,minWidth:0,marginLeft:menuPinned?drawerWidth:0,transition:'margin-left 0.22s ease'}},
        renderContentFor(tab,setTab,{onMenuToggle:()=>setMenuOpen(o=>!o)})
      )
    );
  }

  // ── LAYOUT DESKTOP: Painel sempre em tela cheia; multiplas janelas arrastaveis simultaneas ──
  return h('div',{style:{minHeight:'100vh',width:'100%',background:C.bg,fontFamily:"-apple-system,'Inter',sans-serif",color:C.text,display:'flex'}},
    h('div',{style:{width:84,flexShrink:0,background:C.surface,borderRight:'1px solid '+C.border,display:'flex',flexDirection:'column',alignItems:'center',paddingTop:20,gap:6,position:'sticky',top:0,height:'100vh'}},
      h('img',{src:LOGO_SRC,alt:'PT',style:{height:34,objectFit:'contain',marginBottom:18}}),
      tabs.map(t=>h(SidebarBtn,{
        key:t.id,t,
        isOpen: t.id==='home' ? openWindows.length===0 : openWindows.some(w=>w.tabId===t.id),
        dragTabId,dragOverTabId,
        onSelect:(id)=>id==='home'?setTab('home'):openDesktopWindow(id),
        onDragStart:(id)=>setDragTabId(id),
        onDragOver:(id)=>setDragOverTabId(id),
        onDragLeave:(id)=>setDragOverTabId(prev=>prev===id?null:prev),
        onDrop:(id)=>{ if(dragTabId) reorderTabs(dragTabId,id); setDragTabId(null); setDragOverTabId(null); },
        onDragEnd:()=>{ setDragTabId(null); setDragOverTabId(null); },
      }))
    ),
    h('div',{style:{flex:1,minWidth:0}},
      h('div',{style:{maxWidth:900,margin:'0 auto',width:'100%'}},
        h(Dashboard,{data,setTab:openDesktopWindow,setData,onLogout:handleLogout,onOpenOs:openOsDetail})
      )
    ),
    ...openWindows.map((w,idx)=>{
      const lbl = (tabs.find(t=>t.id===w.tabId)||{}).label||'';
      return h(DraggableWindow,{key:w.id,title:lbl,onClose:()=>closeDesktopWindow(w.id),offsetIndex:idx,zIndex:500+idx,onFocus:()=>focusDesktopWindow(w.id)}, renderContentFor(w.tabId, openDesktopWindow));
    })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));


  </script>
</body>
</html>
