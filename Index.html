const KEY   = "os_app_v4";
const EMPTY = {clientes:[],ordens:[],orcamentos:[],produtos:[],servicos:[]};

// Salva localmente
const saveLocal = (d) => { try{localStorage.setItem(KEY,JSON.stringify(d));}catch{} };
const loadLocal = () => { try{const s=localStorage.getItem(KEY);return s?{...EMPTY,...JSON.parse(s)}:null;}catch{return null;} };

// Chave de sincronização — armazena o BIN ID do usuário
const BIN_KEY = "os_bin_id_v4";
const getBinId = () => { try{return localStorage.getItem(BIN_KEY)||"";}catch{return "";} };
const setBinId = (id) => { try{localStorage.setItem(BIN_KEY,id);}catch{} };

// API JSONBin.io — gratuita, sem cadastro necessário
const API = "https://api.jsonbin.io/v3";
const MASTER_KEY = "$2a$10$placeholder"; // será configurado pelo usuário

const loadFromCloud = async (binId) => {
  try {
    const r = await fetch(API+"/b/"+binId+"/latest", {
      headers:{"X-Master-Key": window._JSONBIN_KEY||""}
    });
    if(!r.ok) return null;
    const d = await r.json();
    return d.record ? {...EMPTY,...d.record} : null;
  } catch{return null;}
};

const saveToCloud = async (data, binId) => {
  try {
    if(!binId) {
      // Cria um novo bin
      const r = await fetch(API+"/b", {
        method:"POST",
        headers:{"Content-Type":"application/json","X-Master-Key":window._JSONBIN_KEY||"","X-Bin-Private":"false","X-Bin-Name":"PointTech-OS"},
        body: JSON.stringify(data)
      });
      if(!r.ok) return null;
      const d = await r.json();
      return d.metadata?.id || null;
    } else {
      // Atualiza bin existente
      await fetch(API+"/b/"+binId, {
        method:"PUT",
        headers:{"Content-Type":"application/json","X-Master-Key":window._JSONBIN_KEY||""},
        body: JSON.stringify(data)
      });
      return binId;
    }
  } catch{return null;}
};

const load = () => loadLocal() || EMPTY;
const save = (d) => {
  saveLocal(d);
  // Sincroniza com cloud em background se tiver configurado
  const binId = getBinId();
  if(window._JSONBIN_KEY && window._JSONBIN_KEY.length > 10) {
    saveToCloud(d, binId).then(id => { if(id && id !== binId) setBinId(id); }).catch(()=>{});
  }
};

/* ── LONG PRESS CARD ── */
const PressCard = ({children,style={},onTap,onLong}) => {
  const timer=useRef(null), fired=useRef(false), startY=useRef(0);
  const onTS=(e)=>{ fired.current=false; startY.current=e.touches[0].clientY; timer.current=setTimeout(()=>{fired.current=true;onLong();},600); };
  const onTE=(e)=>{ clearTimeout(timer.current); const dy=Math.abs(e.changedTouches[0].clientY-startY.current); if(!fired.current&&dy<8)onTap(); };
  const onTM=(e)=>{ if(Math.abs(e.touches[0].clientY-startY.current)>8)clearTimeout(timer.current); };
  return <div onTouchStart={onTS} onTouchEnd={onTE} onTouchMove={onTM} onClick={onTap} style={{background:C.card,borderRadius:14,padding:"14px 16px",border:"1px solid "+C.border,marginBottom:10,cursor:"pointer",userSelect:"none",WebkitUserSelect:"none",...style}}>{children}</div>;
};

const textoWA = (tipo,numero,status,cliNome,descricao,valor,itens,obs) => {
  let t=`*Point Tech — ${tipo}*\n━━━━━━━━━━━━━━━━━━━━\n`;
  t+=`📋 *Número:* ${numero}\n👤 *Cliente:* ${cliNome}\n📌 *Status:* ${status}\n`;
  if(descricao) t+=`🔧 *Serviço:* ${descricao}\n`;
  if(itens&&itens.length){t+=`\n*Itens:*\n`;itens.forEach(i=>{const s=parseBRL(i.qtd||"0")*parseBRL(i.unit||"0");t+=`  • ${i.desc} (${i.qtd}x R$ ${fmtNum(parseBRL(i.unit))}) = R$ ${fmtNum(s)}\n`;});}
  if(valor) t+=`\n💰 *Valor Total:* R$ ${fmtNum(parseBRL(valor))}\n`;
  if(obs)   t+=`\n📝 *Obs:* ${obs}\n`;
  t+=`━━━━━━━━━━━━━━━━━━━━\n_Point Tech — Tecnologia que conecta você!_`;
  return t;
};

const buildHtml = (tipo, numero, statusLabel, cli, itens, servicos, descEquip, valorTotal, obs, data_emissao, tecnico) => {
  const cliNome = cli?.nome||"—";
  const cliDoc  = cli?.cpfcnpj||"";
  const cliEnd  = cli?.logradouro?(cli.logradouro+(cli.numero?", "+cli.numero:"")):"";
  const cliBairro = cli?.bairro||"";
  const cliCep  = cli?.cep||"";
  const cliCidade = cli?.cidade||"";
  const cliUF   = cli?.estado||"PR";
  const cliTel  = cli?.telefone||"";
  const cliEmail= cli?.email||"";

  const totalProd = (itens||[]).reduce((s,i)=>s+parseBRL(i.qtd||"0")*parseBRL(i.unit||"0"),0);
  const totalServ = (servicos||[]).reduce((s,i)=>s+parseBRL(i.qtd||"0")*parseBRL(i.unit||"0"),0);
  const totalGeral = valorTotal||totalProd+totalServ;

  const rowsProd = (itens||[]).map((it,i)=>`
    <tr>
      <td>${i+1}</td>
      <td style="text-align:left">${it.desc||it.nome||""}</td>
      <td>${it.qtd||1}</td>
      <td>R$ ${fmtNum(parseBRL(it.unit||"0"))}</td>
      <td>R$ 0,00</td>
      <td>R$ ${fmtNum(parseBRL(it.qtd||"0")*parseBRL(it.unit||"0"))}</td>
    </tr>`).join("");

  const rowsServ = (servicos||[]).map((sv,i)=>`
    <tr>
      <td>${i+1}</td>
      <td style="text-align:left">${sv.desc||sv.nome||""}</td>
      <td>${sv.qtd||1}</td>
      <td>R$ ${fmtNum(parseBRL(sv.unit||"0"))}</td>
      <td>R$ 0,00</td>
      <td>R$ ${fmtNum(parseBRL(sv.qtd||"0")*parseBRL(sv.unit||"0"))}</td>
    </tr>`).join("");

  return `<!DOCTYPE html><html><head><meta charset="utf-8">
<title>Point Tech — ${tipo} Nº ${numero}</title>
<style>
  @media print{body{margin:0;padding:8px;}.no-print{display:none!important;}}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Arial,sans-serif;font-size:11px;color:#111;background:#fff;padding:12px;}
  .share-bar{position:fixed;bottom:0;left:0;right:0;display:flex;background:#1a56db;z-index:99;}
  .share-bar button{flex:1;border:none;padding:13px 6px;font-size:13px;font-weight:700;cursor:pointer;color:#fff;background:transparent;border-right:1px solid rgba(255,255,255,0.3);}
  .share-bar button:last-child{border-right:none;background:#25D366;}
  @media print{.share-bar{display:none;}}
  .header-box{border:1px solid #333;display:grid;grid-template-columns:180px 1fr 140px;margin-bottom:0;}
  .logo-cell{padding:8px;border-right:1px solid #333;display:flex;align-items:center;justify-content:center;}
  .logo-cell img{max-height:60px;max-width:160px;object-fit:contain;}
  .empresa-cell{padding:8px;text-align:center;border-right:1px solid #333;font-size:10px;line-height:1.6;}
  .empresa-cell strong{font-size:12px;display:block;}
  .os-cell{padding:8px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .os-num{font-size:16px;font-weight:900;border:2px solid #333;padding:4px 10px;margin-top:4px;}
  .os-label{font-size:10px;font-weight:700;text-transform:uppercase;}
  table.info{width:100%;border-collapse:collapse;border:1px solid #333;border-top:none;}
  table.info td{border:1px solid #333;padding:4px 6px;font-size:10px;vertical-align:top;}
  table.info .lbl{font-weight:700;font-size:9px;text-transform:uppercase;color:#555;display:block;margin-bottom:1px;}
  .section-title{background:#eee;border:1px solid #333;border-top:none;padding:4px 8px;font-weight:700;font-size:10px;text-align:center;text-transform:uppercase;letter-spacing:1px;}
  table.items{width:100%;border-collapse:collapse;border:1px solid #333;border-top:none;}
  table.items th{background:#eee;border:1px solid #333;padding:4px 6px;font-size:9px;text-transform:uppercase;text-align:center;}
  table.items td{border:1px solid #333;padding:4px 6px;font-size:10px;text-align:center;}
  table.items .total-row td{font-weight:700;background:#f5f5f5;}
  .equip-box{border:1px solid #333;border-top:none;min-height:30px;padding:6px 8px;font-size:11px;}
  .obs-box{border:1px solid #333;border-top:none;min-height:30px;padding:6px 8px;font-size:11px;}
  .valor-total{border:2px solid #333;border-top:none;padding:8px;text-align:right;font-weight:900;font-size:13px;}
  .assinaturas{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-top:20px;padding-bottom:60px;}
  .ass-item{text-align:center;}
  .ass-line{border-top:1px solid #333;margin-bottom:4px;margin-top:30px;}
  .ass-label{font-size:9px;text-transform:uppercase;color:#555;}

<!-- CABEÇALHO -->

</table>

<!-- EQUIPAMENTO / DESCRIÇÃO -->
<div class="section-title">Equipamento / Descrição do Serviço</div>
<div class="equip-box">${descEquip||"—"}</div>

${ (itens&&itens.length>0) ? `

<table class="items">

  ${rowsProd}

</table>` : "" }

${ (servicos&&servicos.length>0) ? `
<!-- SERVIÇOS -->
<div class="section-title">Serviços</div>
<table class="items">

<!-- OBSERVAÇÕES -->

const DocModal = ({doc,onClose}) => {
  if(!doc) return null;

  const abrirDoc = () => {
    const w = window.open("","_blank");
    if(w){ w.document.open(); w.document.write(doc.html); w.document.close(); }
  };

  const enviarWA = () => {
    const tel=(doc.tel||"").replace(/\D/g,"");
    const msg=encodeURIComponent(doc.waText||"");
    window.open(tel?"https://wa.me/55"+tel+"?text="+msg:"https://wa.me/?text="+msg,"_blank");
  };

  return (
    <div style={{position:"fixed",inset:0,background:"#000c",zIndex:9999,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:"24px 20px 44px",width:"100%",maxWidth:430,border:"1px solid "+C.border}}>

      document.body.removeChild(a);

const CepField = ({cep,onChange,onFound}) => {
  const [msg,setMsg]=useState(""); const [ok,setOk]=useState(false); const [load,setLoad]=useState(false); const cbRef=useRef(null);
  const fromLocal=(d)=>{ const p5=d.slice(0,5),p4=d.slice(0,4),p3=d.slice(0,3); const m=PR_CEPS[p5]||PR_CEPS[p4]||PR_CEPS[p3]; return m?{bairro:m[0],localidade:m[1],uf:"PR"}:null; };
  const viacep=(digits)=>new Promise(res=>{
    if(cbRef.current){try{delete window[cbRef.current];}catch(e){}}
    const cb="_vc_"+Date.now(); cbRef.current=cb;
    const tid=setTimeout(()=>{try{delete window[cb];}catch(e){}const s=document.getElementById(cb);if(s)s.remove();res(null);},5000);
    window[cb]=(d)=>{clearTimeout(tid);try{delete window[cb];}catch(e){}const s=document.getElementById(cb);if(s)s.remove();res(d&&!d.erro?d:null);};
    const sc=document.createElement("script"); sc.id=cb; sc.src="https://viacep.com.br/ws/"+digits+"/json/?callback="+cb;
    sc.onerror=()=>{clearTimeout(tid);try{delete window[cb];}catch(e){}sc.remove();res(null);}; document.head.appendChild(sc);
  });
  const buscar=async(raw)=>{
    const digits=(raw||cep).replace(/\D/g,""); if(digits.length!==8){setMsg("CEP deve ter 8 dígitos");setOk(false);return;}
    setLoad(true);setMsg("Buscando...");setOk(false);
    const vc=await viacep(digits);
    if(vc&&vc.localidade){onFound({logradouro:vc.logradouro||"",bairro:vc.bairro||"",localidade:vc.localidade,uf:vc.uf||"PR"});setMsg(vc.logradouro?"Endereço completo!":"Cidade/bairro preenchidos!");setOk(true);setLoad(false);return;}
    const loc=fromLocal(digits);
    if(loc){onFound({logradouro:"",bairro:loc.bairro,localidade:loc.localidade,uf:"PR"});setMsg("Cidade e bairro preenchidos!");setOk(true);}
    else{setMsg("CEP não encontrado. Preencha manualmente.");setOk(false);}
    setLoad(false);
  };
  const handleChange=(e)=>{const v=maskCep(e.target.value);onChange(v);setMsg("");setOk(false);if(v.replace(/\D/g,"").length===8)buscar(v);};
  return (
    <div style={{marginBottom:14}}>
      <div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:5,letterSpacing:0.5,textTransform:"uppercase"}}>CEP</div>
      <div style={{display:"flex",gap:8}}>
        <input value={cep} onChange={handleChange} placeholder="00000-000" maxLength={9} inputMode="numeric" style={{...s_inp,flex:1,borderColor:ok?C.green:(msg&&!ok?C.red:C.border)}}/>
        <button onClick={()=>buscar(cep)} disabled={load} style={{background:C.accentDim,border:"2px solid "+C.accent,borderRadius:10,padding:"0 14px",cursor:load?"wait":"pointer",display:"flex",alignItems:"center",gap:6,color:C.accent,fontWeight:700,fontSize:14,whiteSpace:"nowrap",flexShrink:0}}>
          <Ic n="search" sz={15} c={C.accent}/>{load?"...":"Buscar"}
        </button>
      </div>
      {msg&&<div style={{fontSize:12,marginTop:4,color:ok?C.green:C.red}}>{msg}</div>}
    </div>
  );
};

        <Sel label="Status" value={form.status} onChange={f("status")} options={Object.entries(STATUS_ORC).map(([v,s])=>({v,l:s.label}))}/>

          {sel&&<Btn small label="Excluir" onClick={()=>setConf(true)} color={C.red} outline icon="trash"/>}

      </div>

  );
};


/* ── BACKUP / RESTORE ── */
const exportarDados = (data) => {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:"application/json"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = "pointtech-backup-"+new Date().toLocaleDateString("pt-BR").replace(/\//g,"-")+".json";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),3000);
};

const importarDados = (setData) => {
  const input = document.createElement("input");
  input.type = "file"; input.accept = ".json";
  input.onchange = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        if(d.clientes && d.ordens && d.orcamentos) {
          setData({...EMPTY,...d});
          alert("✓ Dados importados com sucesso!");
        } else { alert("Arquivo inválido."); }
      } catch { alert("Erro ao ler o arquivo."); }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input); input.click();
  document.body.removeChild(input);
};

/* ═══ SYNC MODAL ═══ */
const SyncModal = ({onClose, onSync}) => {
  const [key, setKey] = useState(window._JSONBIN_KEY||"");
  const [binId, setBinIdLocal] = useState(getBinId());
  const [status, setStatus] = useState("");
  const [loading, setLoading] = useState(false);

  const salvar = async () => {
    if(!key.trim()){setStatus("Cole a Master Key do JSONBin"); return;}
    window._JSONBIN_KEY = key.trim();
    try{localStorage.setItem("os_jbkey", key.trim());}catch{}
    setStatus("Configurado! Sincronizando...");
    onSync(key.trim());
    setTimeout(onClose, 1500);
  };

  const sincronizarAgora = async () => {
    if(!key.trim()){setStatus("Configure a Master Key primeiro"); return;}
    setLoading(true); setStatus("Buscando dados da nuvem...");
    window._JSONBIN_KEY = key.trim();
    const bid = getBinId();
    const d = await loadFromCloud(bid);
    if(d){
      onSync(key.trim(), d);
      setStatus("✓ Dados sincronizados com sucesso!");
    } else {
      setStatus("Nenhum dado na nuvem ainda. Salve algo para criar.");
    }
    setLoading(false);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"#000c",zIndex:9999,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:C.surface,borderRadius:"20px 20px 0 0",padding:"24px 20px 48px",width:"100%",maxWidth:430,border:"1px solid "+C.border}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <span style={{fontWeight:800,fontSize:17,color:C.text}}>☁️ Sincronização na nuvem</span>
          <button onClick={onClose} style={{background:"transparent",border:"2px solid "+C.border,borderRadius:10,padding:"6px 12px",color:C.muted,fontWeight:700,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{background:C.card,borderRadius:12,padding:"12px 14px",marginBottom:16,fontSize:13,color:C.muted,lineHeight:1.6}}>
          <strong style={{color:C.text}}>Como configurar (grátis):</strong><br/>
          1. Acesse <strong style={{color:C.accent}}>jsonbin.io</strong> e crie uma conta<br/>
          2. Vá em <strong style={{color:C.accent}}>API Keys</strong> → copie a <strong>Master Key</strong><br/>
          3. Cole abaixo e toque em Salvar
        </div>
        <div style={{marginBottom:12}}>
          <div style={{color:C.muted,fontSize:12,fontWeight:600,marginBottom:5,textTransform:"uppercase"}}>Master Key</div>
          <input value={key} onChange={e=>setKey(e.target.value)} placeholder="$2a$10$..." style={{...s_inp,fontFamily:"monospace",fontSize:13}}/>
        </div>
        {status&&<div style={{color:status.includes("✓")?C.green:C.yellow,fontSize:13,marginBottom:12,fontWeight:600}}>{status}</div>}
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <button onClick={salvar} style={{width:"100%",background:C.accent,border:"none",borderRadius:12,padding:"13px",color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer"}}>💾 Salvar configuração</button>
          <button onClick={sincronizarAgora} disabled={loading} style={{width:"100%",background:"transparent",border:"2px solid "+C.green,borderRadius:12,padding:"13px",color:C.green,fontWeight:700,fontSize:15,cursor:"pointer"}}>
            {loading?"Sincronizando...":"📥 Buscar dados da nuvem"}
          </button>
        </div>
      </div>
    </div>
  );
};

/* ═══ DASHBOARD ═══ */
const Dashboard=({data,setTab,setData})=>{
  const [syncModal,setSyncModal] = useState(false);
  const syncOk = !!(window._JSONBIN_KEY && getBinId());

  useEffect(()=>{
    // Restaura chave salva
    try{const k=localStorage.getItem("os_jbkey");if(k)window._JSONBIN_KEY=k;}catch{}
  },[]);

  const handleSync = (key, cloudData) => {
    window._JSONBIN_KEY = key;
    if(cloudData) setData(cloudData);
  };

  const Stat=({label,value,color,tab})=>(<div onClick={()=>setTab(tab)} style={{background:C.card,borderRadius:14,padding:"14px 16px",border:"1px solid "+C.border,cursor:"pointer"}}><div style={{fontSize:28,fontWeight:900,color}}>{value}</div><div style={{color:C.muted,fontSize:12,fontWeight:600,marginTop:2}}>{label}</div></div>);
  return (
    <div>
      {syncModal&&<SyncModal onClose={()=>setSyncModal(false)} onSync={handleSync}/>}
      <div style={{background:C.bg,borderBottom:"1px solid "+C.border,padding:"10px 16px 8px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <img src={LOGO} alt="Point Tech" style={{height:60,objectFit:"contain",display:"block"}}/>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={()=>setSyncModal(true)} title="Sincronização na nuvem" style={{background:syncOk?C.green+"22":"#2a1a1a",border:"1px solid "+(syncOk?C.green:C.red),borderRadius:10,padding:"6px 10px",color:syncOk?C.green:C.red,fontSize:12,fontWeight:700,cursor:"pointer"}}>{syncOk?"☁️ Sync":"⚠️ Sync"}</button>

        </div>
      </div>
      <div style={{padding:"16px 16px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          <Stat label="OS Abertas"     value={data.ordens.filter(o=>o.status==="aberta").length}                           color={C.yellow} tab="os"/>
          <Stat label="Em andamento"   value={data.ordens.filter(o=>o.status==="em_andamento").length}                    color={C.accent} tab="os"/>
          <Stat label="Concluídas"     value={data.ordens.filter(o=>["concluida","entregue"].includes(o.status)).length}  color={C.green}  tab="os"/>
          <Stat label="Orç. Pendentes" value={data.orcamentos.filter(o=>o.status==="pendente").length}                    color={C.yellow} tab="orc"/>
        </div>
        <div style={{color:C.muted,fontSize:11,fontWeight:700,letterSpacing:0.5,marginBottom:10}}>RECENTES</div>
        {data.ordens.length===0?<Empty msg="Nenhuma OS. Comece cadastrando um cliente!"/>
        :data.ordens.slice(-4).reverse().map(o=>{const c=data.clientes.find(cl=>cl.id===o.clienteId);return(
          <Card key={o.id} onClick={()=>setTab("os")}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{flex:1,minWidth:0,marginRight:8}}><div style={{fontWeight:700,fontSize:14,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.descricao}</div><div style={{color:C.muted,fontSize:12,marginTop:2}}>{c?.nome||"—"} · {o.data}</div></div>
              <Badge {...STATUS_OS[o.status]}/>
            </div>
          </Card>
        );})}
      </div>
    </div>
  );
};
